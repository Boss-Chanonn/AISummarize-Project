<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Learnova â€” Plan &amp; Billing</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount"></div>
  <main class="main-content">

    <div class="page-header fade-up">
      <div class="billing-intro">
        <div class="page-title">Plan &amp; Billing</div>
        <div class="page-subtitle">Upgrade to Pro and unlock full learning power</div>
      </div>
    </div>

    <div class="billing-grid fade-up fade-up-1 reveal reveal-delay-1" id="billing-grid">
      <!-- Rendered by JS -->
    </div>

  </main>
</div>

<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>
<script src="js/animations.js"></script>
<script src="js/app.js"></script>
<script src="js/billing.js"></script>
<script>
  // Auth guard
  (function () {
    const token = localStorage.getItem('token');
    if (!token) { window.location.replace('index.html'); }
  })();

  document.getElementById('sidebar-mount').innerHTML = renderSidebar('billing');

  // â”€â”€ Confirm dialog â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  function showConfirm({ title, body, confirmLabel, confirmClass, onConfirm }) {
    const el = document.createElement('div');
    el.className = 'plan-confirm-overlay';
    el.id = 'plan-confirm';
    el.innerHTML = `
      <div class="plan-confirm-box">
        <div class="plan-confirm-title">${title}</div>
        <div class="plan-confirm-body">${body}</div>
        <div class="plan-confirm-actions">
          <button class="btn" onclick="closeConfirm()">Cancel</button>
          <button class="btn ${confirmClass || 'btn-primary'}" id="plan-confirm-ok">${confirmLabel}</button>
        </div>
      </div>`;
    document.body.appendChild(el);
    document.getElementById('plan-confirm-ok').addEventListener('click', () => {
      closeConfirm();
      onConfirm();
    });
  }

  function closeConfirm() {
    const el = document.getElementById('plan-confirm');
    if (el) el.remove();
  }

  // â”€â”€ Navigation helpers â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  function goToPayment(planType) {
    sessionStorage.setItem('selected_plan', planType);
    window.location.href = 'payment.html';
  }

  // â”€â”€ Plan action handlers â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  // Called when user clicks "Select plan" on Free card (currently Pro)
  function confirmDowngradeToFree() {
    showConfirm({
      title: 'Downgrade to Free?',
      body:  'You will lose access to <strong>Pro features</strong> immediately, including PowerPoint upload and multi-file upload.',
      confirmLabel: 'Yes, downgrade',
      confirmClass: '',
      onConfirm: executeDowngrade,
    });
  }

  // Called when user clicks "Cancel plan" on current Pro card
  function confirmCancelPlan(planLabel) {
    showConfirm({
      title: 'Cancel your Pro plan?',
      body:  `Your <strong>Pro ${planLabel}</strong> plan will be cancelled and your account will revert to the Free plan.`,
      confirmLabel: 'Yes, cancel plan',
      confirmClass: '',
      onConfirm: executeDowngrade,
    });
  }

  // Called when user clicks "Select plan" on a different Pro tier (Monthly â†” Yearly)
  function confirmSwitchPlan(fromLabel, toLabel, toPlanType) {
    const isUpgrade = toPlanType === 'yearly';
    showConfirm({
      title: isUpgrade ? `Upgrade to Pro Yearly?` : `Switch to Pro Monthly?`,
      body:  isUpgrade
        ? `Switch from <strong>Pro Monthly</strong> to <strong>Pro Yearly ($99.99/yr)</strong> and save 36%. You will be taken to the payment page.`
        : `Switch from <strong>Pro Yearly</strong> to <strong>Pro Monthly ($12.99/mo)</strong>. You will be taken to the payment page.`,
      confirmLabel: isUpgrade ? 'Upgrade to Yearly â†’' : 'Switch to Monthly â†’',
      confirmClass: 'btn-primary',
      onConfirm: () => goToPayment(toPlanType),
    });
  }

  async function executeDowngrade() {
    const token = localStorage.getItem('token');
    try {
      const res  = await fetch('/api/billing/downgrade', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token },
      });
      const data = await res.json();
      if (data.success) {
        // Sync localStorage so other pages reflect the new tier immediately
        const stored = JSON.parse(localStorage.getItem('user') || '{}');
        stored.tier = 'free';
        localStorage.setItem('user', JSON.stringify(stored));
        showToast('Plan cancelled â€” you are now on Free');
        setTimeout(() => renderBilling(), 600);
      } else {
        showToast('Something went wrong, please try again');
      }
    } catch (e) {
      showToast('Network error, please try again');
    }
  }

  // â”€â”€ Render â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  async function renderBilling() {
    const status = await getBillingStatus();
    const tier   = status ? status.tier : 'free';
    const isPro  = tier === 'pro';

    const freeFeatures = [
      { ok: true,  text: 'Upload PDF, Word, Text' },
      { ok: true,  text: '1 file at a time' },
      { ok: true,  text: 'AI Summary &amp; Quiz' },
      { ok: true,  text: 'Learning History' },
      { ok: false, text: 'PowerPoint upload' },
      { ok: false, text: 'Multiple file upload' },
    ];

    const proFeatures = [
      { ok: true, text: 'Everything in Free' },
      { ok: true, text: 'PowerPoint upload' },
      { ok: true, text: 'Upload 3 files simultaneously' },
      { ok: true, text: 'Unlimited PDF, Word, Text' },
      { ok: true, text: 'Priority AI processing' },
      { ok: true, text: 'Advanced analytics' },
    ];

    // Free card button logic
    let freeBtnHtml;
    if (!isPro) {
      freeBtnHtml = `<div class="plan-current-indicator"><span class="plan-current-dot"></span>Current plan</div>
                     <div class="btn-disabled">Current plan</div>`;
    } else {
      freeBtnHtml = `<button class="btn-select" onclick="confirmDowngradeToFree()">Select plan</button>`;
    }

    const freeCard = `
      <div class="plan-box">
        <div class="plan-label">Basic</div>
        <div class="plan-name">Free</div>
        <div class="plan-price-row">
          <span class="plan-price-big">$0</span>
          <span class="plan-price-period">/month</span>
        </div>
        <div class="plan-price-note">No credit card required</div>
        <div class="plan-divider"></div>
        <div class="plan-feature-list">
          ${freeFeatures.map(f => `
            <div class="plan-feature-item${f.ok ? '' : ' disabled'}">
              <span class="feature-icon">${f.ok ? 'âœ“' : 'âœ—'}</span>
              <span>${f.text}</span>
            </div>`).join('')}
        </div>
        ${freeBtnHtml}
      </div>`;

    const activeMonthly = isPro && status && status.plan_type === 'monthly';
    const activeYearly  = isPro && status && status.plan_type === 'yearly';

    let expiresText = '';
    if (isPro && status) {
      const d = status.plan_expires && status.plan_expires !== 'None'
        ? new Date(status.plan_expires).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })
        : '';
      if (d) expiresText = d;
    }

    function proCardHtml(planType) {
      const isMonthly = planType === 'monthly';
      const isActive  = isMonthly ? activeMonthly : activeYearly;
      const price     = isMonthly ? '$12.99' : '$99.99';
      const period    = isMonthly ? '/month' : '/year';
      const priceNote = isMonthly ? 'Billed monthly' : 'Save 36% vs monthly';
      const noteClass = isMonthly ? 'plan-price-note' : 'plan-price-note save-note';
      const pillLabel = isMonthly ? 'Monthly' : 'Yearly';

      let actionHtml;

      if (isActive) {
        // This is the user's current plan â€” red Cancel plan button
        const statusBox = expiresText
          ? `<div class="pro-status-box">
               <div class="pro-status-label">Active ${pillLabel} plan</div>
               <div class="pro-status-value">Renews ${expiresText}</div>
             </div>`
          : '';
        actionHtml = `
          <div class="plan-current-indicator"><span class="plan-current-dot"></span>Current plan</div>
          ${statusBox}
          <button class="btn-cancel" onclick="confirmCancelPlan('${pillLabel}')">Cancel plan</button>`;
      } else if (isPro) {
        // User is Pro but on the other tier â€” white outline Select plan
        const otherLabel = isMonthly ? 'Yearly' : 'Monthly';
        actionHtml = `
          <button class="btn-select" onclick="confirmSwitchPlan('${otherLabel}','${pillLabel}','${planType}')">Select plan</button>`;
      } else {
        // User is Free â€” gold Upgrade button
        actionHtml = `
          <button class="btn btn-primary" onclick="goToPayment('${planType}')" style="width:100%;justify-content:center">Upgrade to Pro â†’</button>`;
      }

      return `
        <div class="plan-box pro-box" style="${isActive ? 'border-color:var(--gold)' : ''}">
          <div class="plan-label">Premium</div>
          <div class="plan-name gold">Pro âœ¨</div>
          <div class="plan-badge-pill">${pillLabel}</div>
          <div class="plan-price-row">
            <span class="plan-price-big">${price}</span>
            <span class="plan-price-period">${period}</span>
          </div>
          <div class="${noteClass}">${priceNote}</div>
          <div class="plan-divider"></div>
          <div class="plan-feature-list">
            ${proFeatures.map(f => `
              <div class="plan-feature-item">
                <span class="feature-icon">âœ“</span>
                <span>${f.text}</span>
              </div>`).join('')}
          </div>
          ${actionHtml}
        </div>`;
    }

    document.getElementById('billing-grid').innerHTML =
      freeCard + proCardHtml('monthly') + proCardHtml('yearly');
  }

  renderBilling();
</script>
</body>
</html>
