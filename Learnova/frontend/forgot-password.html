<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Learnova — Forgot password</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body{margin:0;background:var(--bg);display:flex;align-items:center;justify-content:center;min-height:100vh}
    .fp-card{border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:40px 36px;width:100%;max-width:420px;margin:24px;
             background:radial-gradient(120% 120% at 0% 0%,rgba(200,184,154,0.08),transparent 50%),
                        linear-gradient(180deg,rgba(240,237,232,0.04),rgba(240,237,232,0.02))}
    .fp-logo{font-family:var(--serif);font-size:22px;margin-bottom:24px;text-align:center}
    .fp-logo em{color:var(--gold);font-style:italic}
    .fp-title{font-family:var(--serif);font-size:26px;text-align:center;margin-bottom:8px;letter-spacing:-0.5px}
    .fp-sub{font-size:13px;color:var(--cream-40);text-align:center;margin-bottom:28px;line-height:1.7}
    .fp-success{display:none;text-align:center;padding:20px 0}
    .fp-success.show{display:block}
    .fp-success-icon{width:48px;height:48px;border-radius:50%;background:rgba(107,158,107,0.12);
                     border:0.5px solid rgba(107,158,107,0.25);display:flex;align-items:center;
                     justify-content:center;margin:0 auto 16px}
    .fp-success-text{font-size:14px;color:var(--cream-60);line-height:1.7;margin-bottom:20px}
  </style>
</head>
<body>
<div class="fp-card fade-up">
        <div class="fp-logo">Learnova <em>✦</em></div>
        <div class="fp-title">Forgot your password?</div>
        <div class="fp-sub">Enter the email address you registered with.<br>We'll send you a link to reset your password.</div>

        <div id="fp-form">
          <div class="form-field">
            <label class="field-label">Email address</label>
            <input class="input" type="email" placeholder="you@university.ac.nz" id="fp-email"/>
          </div>
          <button class="btn-primary btn" style="width:100%;justify-content:center;margin-top:8px" id="fp-btn" onclick="sendResetLink()">Send reset link</button>
          <div class="modal-footer" style="margin-top:20px"><a href="index.html">Back to sign in</a></div>
        </div>

        <div class="fp-success" id="fp-success">
          <div class="fp-success-icon">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#6B9E6B" stroke-width="1.5"><path d="M3 12l5 5L19 6"/></svg>
          </div>
          <div class="fp-success-text">If that email is registered, you'll receive a password reset link shortly. Check your inbox (and spam folder).</div>
          <a href="index.html" class="btn" style="display:inline-flex">Back to sign in</a>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
function sendResetLink() {
  var email = document.getElementById('fp-email').value.trim();
  if (!email) { showToast('Please enter your email'); return; }
  var btn = document.getElementById('fp-btn');
  btn.disabled = true; btn.textContent = 'Sending…';
  fetch('/api/auth/forgot-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email }),
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if (data.detail) { showToast(data.detail); btn.disabled = false; btn.textContent = 'Send reset link'; return; }
    document.getElementById('fp-form').style.display = 'none';
    document.getElementById('fp-success').classList.add('show');
  })
  .catch(function(){ showToast('Could not connect to server'); btn.disabled = false; btn.textContent = 'Send reset link'; });
}

document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  if (!e.target || e.target.id !== 'fp-email') return;
  if (document.getElementById('fp-form').style.display === 'none') return;
  e.preventDefault();
  sendResetLink();
});
</script>
</body>
</html>
