<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Learnova — History</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .history-item{display:flex;flex-direction:column;background:var(--cream-05);border:0.5px solid var(--border);border-radius:var(--radius-md);overflow:hidden;transition:border-color 0.18s,transform 0.22s cubic-bezier(0.16,1,0.3,1),box-shadow 0.22s;cursor:pointer}
    .history-item:hover{border-color:var(--border-md);transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,0.12)}
    .history-item.open{border-color:rgba(200,184,154,0.3)}
    .hi-row{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:16px;padding:14px 18px;width:100%}
    .hi-left{display:flex;align-items:center;gap:12px;min-width:0;width:100%}
    .hi-dot{width:6px;height:6px;border-radius:50%;background:rgba(200,184,154,0.35);flex-shrink:0}
    .hi-dot.done{background:var(--green);opacity:0.85}
    .hi-title{font-size:13px;color:var(--cream-60);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .hi-meta{font-size:11px;color:var(--cream-25);margin-top:2px}
    .hi-right{display:flex;align-items:center;justify-content:flex-end;gap:12px;flex-shrink:0;min-width:max-content}
    .hi-score{font-size:12px;color:var(--gold-dim);font-weight:500;white-space:nowrap}
    .hi-score.na{color:var(--cream-25)}
    .hi-chevron{font-size:10px;color:var(--cream-25);transition:transform 0.2s;flex-shrink:0;width:16px;text-align:center}
    .history-item.open .hi-chevron{transform:rotate(180deg)}

    /* Mini result panel */
    .mini-result{background:transparent}
    .mr-top{display:grid;grid-template-columns:minmax(140px,180px) minmax(0,1fr);align-items:start;gap:20px;margin-bottom:14px}
    .mr-score{font-family:var(--serif);font-size:36px;color:var(--gold);line-height:1}
    .mr-correct{font-size:12px;color:var(--cream-25);margin-top:3px}
    .mr-section{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--cream-25);margin:10px 0 6px}
    .mr-tags{display:flex;flex-wrap:wrap;gap:5px}
    .mr-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;padding-top:12px;border-top:0.5px solid var(--border)}
    .mr-actions .btn{justify-content:center;flex:1 1 160px}

    /* Summary modal */
    .sum-modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:300;align-items:center;justify-content:center;padding:20px}
    .sum-modal-backdrop.open{display:flex}
    .sum-modal{background:var(--surface);border:0.5px solid var(--border-md);border-radius:var(--radius-lg);width:100%;max-width:560px;max-height:82vh;display:flex;flex-direction:column;animation:fadeUp 0.2s ease}
    .sum-modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:22px 24px 16px;border-bottom:0.5px solid var(--border);flex-shrink:0}
    .sum-modal-title{font-family:var(--serif);font-size:20px;font-weight:400;letter-spacing:-0.3px;line-height:1.2}
    .sum-modal-close{background:none;border:none;color:var(--cream-25);font-size:18px;cursor:pointer;flex-shrink:0;padding:2px 4px;line-height:1}
    .sum-modal-close:hover{color:var(--cream-60)}
    .sum-modal-body{overflow-y:auto;padding:20px 24px 24px;display:flex;flex-direction:column;gap:16px}
    .sum-modal-badge{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
    .sum-modal-para{font-size:13px;color:var(--cream-60);line-height:1.75}
    .sum-modal-kp-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--cream-25);margin-bottom:8px}
    .sum-modal-kp{display:flex;flex-direction:column;gap:6px}
    .sum-modal-kp-item{display:flex;gap:8px;font-size:12px;color:var(--cream-60);line-height:1.6}
    .sum-modal-kp-dash{color:var(--gold-dim);flex-shrink:0}
    [data-theme="light"] .sum-modal{background:linear-gradient(180deg,rgba(255,255,255,0.99),rgba(241,236,228,0.97));box-shadow:0 20px 50px rgba(42,31,19,0.12)}
    /* Detail modal */
  </style>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount"></div>
  <main class="main-content">
    <div class="page-header fade-up">
      <div>
        <div class="page-title">Quiz history</div>
        <div class="page-subtitle">All your past quizzes — click any entry to expand the summary.</div>
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px" class="fade-up fade-up-1">
      <div class="section-label" style="margin:0" id="history-count">All quizzes</div>
      <span style="font-size:11px;color:var(--green)" id="history-avg"></span>
    </div>

    <div style="display:flex;flex-direction:column;gap:8px" class="fade-up fade-up-2" id="history-list"></div>
  </main>
</div>

<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>
<script src="js/mock-api.js"></script>
<script src="js/app.js"></script>
<script src="js/auth-logout.js"></script>
<script>
document.getElementById('sidebar-mount').innerHTML = renderSidebar('history');

// Store history data for summary modal lookup
let _historyStore = {};

function fmtHistoryMeta(h) {
  const d = h.uploadedAt ? new Date(h.uploadedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '';
  const t = h.fileType || 'Text';
  return (t + (d ? ' · ' + d : ''));
}

function flatAnalysis(h) {
  const a = h.analysis || {};
  return {
    strengths: a.strengths || [],
    weaknesses: a.weaknesses || [],
    studyNext: a.studyNext || [],
    recommendations: a.recommendations || []
  };
}

async function renderHistory() {
  try {
    const response = await fetch('/api/history', {
      method: 'GET',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + localStorage.getItem('token')
      }
    });
    const items = await response.json();
    if (!response.ok) { showToast(items.message || 'Failed to load history'); return; }

    // Update count and average dynamically
    const completed = items.filter(h => h.done);
    const avg = completed.length > 0
      ? Math.round(completed.reduce((sum, h) => sum + h.score, 0) / completed.length)
      : 0;
    document.getElementById('history-count').textContent = 'All quizzes (' + items.length + ')';
    document.getElementById('history-avg').textContent = completed.length > 0 ? 'Average: ' + avg + '%' : '';

    if (!items.length) {
      document.getElementById('history-list').innerHTML = '<div style="text-align:center;padding:32px;font-size:13px;color:var(--cream-25);font-style:italic">No quizzes yet. Upload a document to get started.</div>';
      return;
    }

    const urlParams = new URLSearchParams(window.location.search);
    const openId = urlParams.get('quiz');
    document.getElementById('history-list').innerHTML = items.map(h => {
      const hid = h._id;
      _historyStore[hid] = h; // store for modal lookup
      const an = flatAnalysis(h);
      const isOpen = hid === openId;
      return `
      <div class="history-item history-item-anim${isOpen?' open':''}" id="hi-${hid}" onclick="toggleItem('${hid}')">
        <div class="hi-row">
          <div class="hi-left">
            <div class="hi-dot${h.done?' done':''}"></div>
            <div style="min-width:0;flex:1">
              <div class="hi-title">${escapeHtml(h.title)}</div>
              <div class="hi-meta">${escapeHtml(fmtHistoryMeta(h))}</div>
            </div>
          </div>
          <div class="hi-right">
            <div class="hi-score${!h.done?' na':''}">${h.done ? h.score+'%' : 'No quiz yet'}</div>
            <span class="hi-chevron">▾</span>
          </div>
        </div>
        ${h.done ? `
        <div class="mini-result">
          <div class="mr-top">
            <div>
              <div class="mr-score">${h.score}%</div>
              <div class="mr-correct">${h.correct} of ${h.total} correct</div>
            </div>
            <div style="flex:1">
              <div class="mr-section">Strengths</div>
              <div class="mr-tags">${an.strengths.map(s=>`<span class="badge badge-green">${escapeHtml(s)}</span>`).join('')}</div>
              <div class="mr-section">Needs work</div>
              <div class="mr-tags">${an.weaknesses.map(s=>`<span class="badge badge-red">${escapeHtml(s)}</span>`).join('')}</div>
              <div class="mr-section">Study next</div>
              <div class="mr-tags">${an.studyNext.map(s=>`<span class="badge badge-gold">${escapeHtml(s)}</span>`).join('')}</div>
            </div>
          </div>
          <div class="mr-actions" onclick="event.stopPropagation()">
            <button class="btn" onclick="event.stopPropagation();openSummaryModal('${hid}')">Summary</button>
            <a href="results.html?id=${hid}" class="btn">Full results</a>
            <a href="module.html?historyId=${hid}" class="btn btn-gold">Learning module →</a>
            <button class="btn" onclick="event.stopPropagation();confirmDelete('${hid}')">Delete</button>
          </div>
        </div>` : `
        <div class="mini-result" style="padding:14px 18px">
          <div style="font-size:12px;color:var(--cream-25);margin-bottom:10px">${escapeHtml((h.summary && h.summary.body) ? (Array.isArray(h.summary.body) ? h.summary.body[0] : h.summary.body).slice(0,200)+'…' : 'No summary yet')}</div>
          <div class="mr-actions" onclick="event.stopPropagation()">
            <button class="btn" onclick="event.stopPropagation();openSummaryModal('${hid}')">Summary</button>
            <a href="upload.html?resume=${hid}&mode=quiz" class="btn">Take quiz →</a>
            <a href="module.html?historyId=${hid}" class="btn btn-gold">Learning module →</a>
            <button class="btn" onclick="event.stopPropagation();confirmDelete('${hid}')">Delete</button>
          </div>
        </div>`}
      </div>`;
    }).join('');
    if (openId) setTimeout(() => {
      const el = document.getElementById('hi-'+openId);
      if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
    }, 200);
  } catch (error) {
    console.error('Error:', error);
    showToast('Unable to load history');
  }
}

function toggleItem(id) {
  const el = document.getElementById('hi-'+id);
  const wasOpen = el.classList.contains('open');
  document.querySelectorAll('.history-item').forEach(e => e.classList.remove('open'));
  if (!wasOpen) el.classList.add('open');
}

async function confirmDelete(id) {
  if (!confirm('Delete this history item? This cannot be undone.')) return;
  try {
    const res = await fetch('/api/history/' + id, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
    });
    if (res.ok) { showToast('Deleted'); renderHistory(); }
    else { const d = await res.json(); showToast(d.message || 'Delete failed'); }
  } catch(e) { showToast('Delete failed'); }
}

function openSummaryModal(id) {
  const h = _historyStore[id] || {};
  const summary = h.summary || {};
  const title = h.title || 'Summary';
  const body = summary.body
    ? (Array.isArray(summary.body) ? summary.body : [summary.body])
    : [];
  const takeaways = summary.takeaways
    ? (Array.isArray(summary.takeaways) ? summary.takeaways : [summary.takeaways])
    : [];
  const backdrop = document.getElementById('sum-modal-backdrop');
  document.getElementById('sum-modal-title').textContent = title || 'Summary';
  document.getElementById('sum-modal-body-content').innerHTML =
    '<div class="sum-modal-badge">AI Summary</div>' +
    body.map(p => `<p class="sum-modal-para">${escapeHtml(p)}</p>`).join('') +
    (takeaways.length ? `
      <div>
        <div class="sum-modal-kp-label">Key takeaways</div>
        <div class="sum-modal-kp">
          ${takeaways.map(t => `<div class="sum-modal-kp-item"><span class="sum-modal-kp-dash">—</span><span>${escapeHtml(t)}</span></div>`).join('')}
        </div>
      </div>` : '') +
    ((!body.length && !takeaways.length) ? '<p class="sum-modal-para" style="color:var(--cream-25);font-style:italic">No summary available for this document.</p>' : '');
  backdrop.classList.add('open');
}

function closeSummaryModal() {
  document.getElementById('sum-modal-backdrop').classList.remove('open');
}

renderHistory();
</script>

<!-- Summary modal -->
<div class="sum-modal-backdrop" id="sum-modal-backdrop" onclick="if(event.target===this)closeSummaryModal()">
  <div class="sum-modal">
    <div class="sum-modal-head">
      <div class="sum-modal-title" id="sum-modal-title"></div>
      <button class="sum-modal-close" onclick="closeSummaryModal()">✕</button>
    </div>
    <div class="sum-modal-body" id="sum-modal-body-content"></div>
  </div>
</div>

<script src="js/animations.js"></script>
</body>
</html>
