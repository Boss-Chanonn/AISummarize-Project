<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Learnova — Upload Document</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount"></div>
  <main class="main-content" style="padding:0">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:0.5px solid var(--border);background:radial-gradient(120% 120% at 0% 0%, rgba(200,184,154,0.07), transparent 42%), linear-gradient(180deg, rgba(240,237,232,0.04), rgba(240,237,232,0.02))">
      <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--cream-25)">
        <a href="dashboard.html" style="color:var(--cream-25)">Dashboard</a>
        <span style="color:var(--border-md)">/</span>
        <span style="color:var(--cream-60)" id="breadcrumb-cur">New document</span>
      </div>
      <div style="display:flex;gap:10px" id="top-actions">
        <button class="btn" id="btn-rescan" style="display:none" onclick="resetUpload()">New upload</button>
        <button class="btn btn-primary" id="btn-quiz" style="display:none" onclick="startQuiz()">Start quiz →</button>
      </div>
    </div>

    <div class="upload-layout">
      <div class="panel panel-left fade-up">
        <div class="upload-panel-head">
          <div class="section-label" style="margin:0" id="upload-panel-label">Upload document</div>
        </div>
        <div class="upload-compact-file" id="upload-compact-file">
          <div class="file-icon-box" id="compact-file-icon">PDF</div>
          <div style="min-width:0;flex:1">
            <div class="compact-file-name" id="compact-file-name">Document ready</div>
            <div class="compact-file-meta" id="compact-file-meta">Quiz in progress</div>
          </div>
        </div>
        <div class="upload-summary-shell" id="upload-summary-shell"></div>

        <div class="upload-input-shell" id="upload-input-shell" style="display:grid;grid-template-rows:1fr">
          <div class="upload-input-shell-inner">
            <!-- Pro multi-file gate -->
            <div id="pro-gate-banner" style="display:none" class="pro-gate">
              <span class="pro-gate-text">Multi-file &amp; PPTX upload — Pro feature</span>
              <button class="btn btn-gold" style="padding:5px 12px;font-size:11px" onclick="openSettings('plan')">Upgrade</button>
            </div>

            <div class="upload-zone" id="drop-zone" onclick="triggerFileInput()"
                 ondragover="handleDrag(event,true)" ondragleave="handleDrag(event,false)" ondrop="handleDrop(event)">
              <svg class="upload-icon" width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1.1">
                <path d="M18 26V14M12 20l6-6 6 6"/>
                <path d="M8 28h20"/><path d="M6 10a4 4 0 014-4h16a4 4 0 014 4"/>
              </svg>
              <div class="upload-main" id="upload-main-text">Drop your file here</div>
              <div class="upload-sub" id="upload-sub-text">PDF or TXT · up to 10 MB</div>
            </div>
            <input type="file" id="file-input" accept=".pdf,.txt" onchange="handleFileInput(this.files)"/>

            <div class="or-divider"><div class="or-line"></div><span class="or-text">or paste text</span><div class="or-line"></div></div>
            <textarea class="input" id="paste-area" rows="4" placeholder="Paste text of your article or notes here…" style="resize:vertical" oninput="checkContent()"></textarea>

            <div class="file-list" id="file-list"></div>

            <button class="btn btn-primary" id="btn-process" style="width:100%;justify-content:center;margin-top:16px;display:none" onclick="processDocument()">
              Summarise with AI →
            </button>
          </div>
        </div>
      </div>

      <div class="panel panel-right fade-up fade-up-2" id="right-panel">
        <div class="empty-state">
          <svg class="empty-icon" width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.1">
            <path d="M10 6h14l8 8v22H10V6z"/><path d="M24 6v8h8"/><path d="M14 18h12M14 24h12M14 30h8"/>
          </svg>
          <div class="empty-text">Your summary will appear here.</div>
          <div class="empty-sub">Upload a document or paste text to begin.</div>
        </div>
      </div>
      <div class="curtain-panel" id="curtain-panel"></div>
    </div>
  </main>
</div>
<button class="sidebar-hamburger" onclick="toggleSidebar(event)" aria-label="Toggle sidebar">☰</button>
<div class="sidebar-backdrop" onclick="toggleSidebar(event)"></div>

<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>
<script src="js/app.js"></script>
<script>
// ── upload.html ────────────────────────────────────────────────────────────────
// This page handles document upload, AI-powered summarisation, and interactive
// quiz-taking for single and multi-file uploads. Users can drag-and-drop PDF,
// TXT, or PPTX files, or paste plain text. The upload pipeline delivers a
// summary panel, synchronises quiz generation (via polling), and persists
// quiz results to the backend for later review.

// ── Sidebar & state ────────────────────────────────────────────────────────────
document.getElementById('sidebar-mount').innerHTML = renderSidebar('upload');

// ── Upload state ───────────────────────────────────────────────────────────────
let uploadedFiles = [];          // File objects attached by the user
let _multiQueue = [];            // Files waiting to be processed in batch mode
let _multiResults = [];          // Completed per-file outcomes [{title, historyId, success}]
let _multiAllData = [];          // Full response data for each successfully processed file
let _multiCurrent = 0;           // Index of the file currently being processed in the queue
let _multiMode = false;          // True when chaining multiple files (summary → quiz → next)
let _multiIndex = 0;             // Which entry in _multiAllData is currently displayed
let currentDoc = { title: '', fileType: 'TXT', pageCount: 1, done: false, score: null, correct: null, total: 8 };
let resumedSession = false;      // True when the page loads from a history result (?resume=)
let processingTimer = null;      // Interval handle for the animated progress bar

let quizData = [];               // Populated from POST /api/upload quiz response

let quizMode = false, currentQ = 0, answers = [], answered = false;

// ── Quiz data management ───────────────────────────────────────────────────────
/**
 * Convert quiz questions from any backend/frontend shape into the legacy
 * q/opts/correct format used by this page's quiz renderer.
 *
 * @param {object} question  Raw quiz question from upload/history/localStorage
 * @param {number} index     Question index for fallback labels
 * @returns {{q: string, opts: string[], correct: number, explanation: string, topic: string}}
 */
function normalizeQuizQuestion(question, index) {
  const raw = question && typeof question === 'object' ? question : {};
  const rawOptions = Array.isArray(raw.opts) ? raw.opts : (Array.isArray(raw.options) ? raw.options : []);
  const opts = rawOptions.slice(0, 4).map(option => String(option || '').trim() || 'Option');
  while (opts.length < 4) opts.push('Option ' + String.fromCharCode(65 + opts.length));

  const rawCorrect = raw.correct !== undefined ? raw.correct : raw.correct_index;
  let correct = Number.parseInt(rawCorrect, 10);
  if (!Number.isInteger(correct) || correct < 0 || correct >= opts.length) correct = 0;

  return {
    q: String(raw.q || raw.question || `Question ${index + 1}`).trim() || `Question ${index + 1}`,
    opts,
    correct,
    explanation: String(raw.explanation || 'Review the summary for the reasoning behind this answer.'),
    topic: String(raw.topic || 'General')
  };
}

/**
 * Normalise and store quiz questions from upload or history responses.
 * Also synchronises currentDoc's quiz references for downstream rendering.
 *
 * @param {object[] | undefined | null} questions  Raw quiz question array
 * @returns {object[]}  The stored quiz data array
 */
function setQuizData(questions) {
  quizData = Array.isArray(questions) ? questions.map(normalizeQuizQuestion) : [];
  if (currentDoc) {
    currentDoc.quizData = quizData;
    currentDoc.quizFull = quizData;
    currentDoc.total = quizData.length || currentDoc.total || 8;
  }
  return quizData;
}

/**
 * Return the currently visible quiz mount so button state changes do not hit
 * stale duplicated markup left behind by panel transition animations.
 *
 * @returns {HTMLElement}
 */
function getQuizMount() {
  const curtain = document.getElementById('curtain-panel');
  if (curtain && curtain.classList.contains('curtain-visible')) return curtain;
  return document.getElementById('right-panel') || document;
}

/* ── Upload UI Helpers ─────────────────────────────────────────────────────── */

/**
 * Check whether the current user has the Pro tier enabled.
 * References the global LEARNOVA_USER set by app.js.
 *
 * @returns {boolean}  True if user's tier equals 'pro'
 */
function isPro() {
  return LEARNOVA_USER.tier === 'pro';
}

/**
 * Update the upload zone, file-accept attributes, and multi-file support
 * based on the current plan tier (Pro allows .pptx/.ppt and multiple files).
 */
function updateUploadUI() {
  const gate = document.getElementById('pro-gate-banner');
  const fileInput = document.getElementById('file-input');

  if (isPro()) {
    fileInput.accept = '.pdf,.txt,.pptx,.ppt';
    document.getElementById('upload-sub-text').textContent = 'PDF, TXT, PPTX · up to 10 MB · multiple files supported';
    fileInput.multiple = true;
    gate.style.display = 'none';
  } else {
    fileInput.accept = '.pdf,.txt';
    fileInput.multiple = false;
    gate.style.display = 'flex';
    document.getElementById('upload-sub-text').textContent = 'PDF or TXT · up to 10 MB (free plan)';
  }
}

/**
 * Programmatically open the hidden file-picker input element.
 */
function triggerFileInput() {
  document.getElementById('file-input').click();
}

/**
 * Toggle visual drag-over state on the upload zone.
 *
 * @param {DragEvent} e        The dragover / dragleave event
 * @param {boolean}  entering  True for dragover, false for dragleave
 */
function handleDrag(e, entering) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.toggle('drag', entering);
}

/**
 * Accept dropped files and delegate to the shared file-handling logic.
 *
 * @param {DragEvent} e  The drop event containing FileList on dataTransfer
 */
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag');
  handleFileInput(e.dataTransfer.files);
}

/* ── File Handling ─────────────────────────────────────────────────────────── */

/**
 * Validate, filter, and store selected files according to plan tier.
 * Free users are limited to a single PDF/TXT; Pro users can queue up to 3
 * files including PPTX. Files exceeding 10 MB are rejected.
 *
 * @param {FileList | File[]} files  Raw file collection from input or drop
 */
function handleFileInput(files) {
  if (!files || !files.length) return;

  const allowed = isPro() ? ['.pdf','.txt','.pptx','.ppt'] : ['.pdf','.txt'];
  const newFiles = Array.from(files).filter(function(file) {
    const extension = '.' + file.name.split('.').pop().toLowerCase();

    if (!allowed.includes(extension)) {
      showToast(extension.toUpperCase() + ' upload requires Pro');
      return false;
    }

    const maxBytes = 10 * 1024 * 1024;
    if (file.size > maxBytes) {
      showToast(file.name + ' exceeds 10 MB limit');
      return false;
    }

    return true;
  });

  if (!isPro() && newFiles.length > 0) {
    uploadedFiles = [newFiles[0]];
  } else {
    uploadedFiles = [...uploadedFiles, ...newFiles].slice(0,3);
  }

  renderFileList();
  checkContent();
  document.getElementById('breadcrumb-cur').textContent = uploadedFiles.length === 1 ? uploadedFiles[0].name : uploadedFiles.length + ' files selected';
}

/**
 * Render attached file cards inside the upload panel's file list.
 * Each card shows the extension badge, file name, size, and a remove button.
 * Delegates to extColor() for per-extension badge colouring.
 */
function renderFileList() {
  const list = document.getElementById('file-list');
  const extColor = function(ext) {
    return ext === 'pptx' || ext === 'ppt' ? '#B89AE8' : ext === 'txt' ? 'var(--green)' : 'var(--gold)';
  };

  list.innerHTML = uploadedFiles.map(function(file, index) {
    const extension = file.name.split('.').pop().toUpperCase();
    return `<div class="file-attached">
      <div class="file-icon-box" style="color:${extColor(extension.toLowerCase())}">${extension}</div>
      <div style="flex:1;min-width:0"><div class="file-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${file.name}</div><div class="file-size">${(file.size / 1024).toFixed(0)} KB</div></div>
      <button class="file-remove" onclick="removeFile(${index})">✕</button>
    </div>`;
  }).join('');

  syncCompactFile();
}

/**
 * Remove a file by its index from the uploadedFiles array and refresh
 * the file list, breadcrumb, and process-button visibility.
 *
 * @param {number} i  Index of the file to remove
 */
function removeFile(i) {
  uploadedFiles.splice(i,1);
  renderFileList();
  checkContent();
  document.getElementById('breadcrumb-cur').textContent = uploadedFiles.length === 0 ? 'New document' : (uploadedFiles.length === 1 ? uploadedFiles[0].name : uploadedFiles.length + ' files selected');
}

/**
 * Show or hide the "Summarise with AI" button depending on whether the user
 * has attached files or pasted text (minimum 30 characters). Also updates
 * the breadcrumb label to reflect the current input mode.
 */
function checkContent() {
  const hasPaste = document.getElementById('paste-area').value.trim().length > 30;
  const hasFiles = uploadedFiles.length > 0;

  document.getElementById('btn-process').style.display = (hasPaste || hasFiles) ? 'flex' : 'none';

  if (!hasFiles && hasPaste) document.getElementById('breadcrumb-cur').textContent = 'Pasted text';
  if (!hasFiles && !hasPaste) document.getElementById('breadcrumb-cur').textContent = 'New document';

  syncCompactFile();
}

/* ── Document Summary Builders ─────────────────────────────────────────────── */

/**
 * Resolve the human-readable label for the compact file header based on
 * current state (attached files, resumed session, or pasted text).
 *
 * @returns {string}  Display label such as "document.pdf" or "Pasted text"
 */
function getActiveUploadLabel() {
  if (uploadedFiles.length === 1) return uploadedFiles[0].name;
  if (uploadedFiles.length > 1) return uploadedFiles.length + ' files selected';
  if (resumedSession && currentDoc && currentDoc.title) return currentDoc.title;
  const pasted = document.getElementById('paste-area').value.trim();
  return pasted ? 'Pasted text' : 'Document ready';
}

/**
 * Check whether the pasted-text area contains enough content (≥30 chars)
 * to warrant processing.
 *
 * @returns {boolean}
 */
function hasPastedText() {
  return document.getElementById('paste-area').value.trim().length > 30;
}

/**
 * Determine whether the current input mode is text-only (no file attached).
 *
 * @returns {boolean}
 */
function isTextOnlyUpload() {
  return uploadedFiles.length === 0 && hasPastedText();
}

/**
 * Format a character count for display in the summary metadata.
 *
 * @param {number} count  Number of characters
 * @returns {string}      e.g. "1 234 chars"
 */
function formatChars(count) {
  return `${count} chars`;
}

/**
 * Return a localised processed-at timestamp for NZ locale.
 *
 * @returns {string}  e.g. "11:45 am"
 */
function getProcessedTime() {
  return new Date().toLocaleTimeString('en-NZ', {
    hour: '2-digit',
    minute: '2-digit',
    hour12: true
  }).toLowerCase();
}

/**
 * Build a synthetic summary payload for pasted-text-only uploads.
 * Returns a minimal document object with placeholder content so the
 * same summary-rendering code path works for file and text inputs.
 *
 * @param {string} pasted  The raw pasted text
 * @returns {object}       Document object with .summary, .infoRows, etc.
 */
function buildPastedSummary(pasted) {
  const charCount = pasted.length;
  const processedAt = getProcessedTime();
  return {
    id: currentDoc.id || 1,
    title: 'Pasted text',
    meta: `.txt · ${formatChars(charCount)}`,
    fileType: 'TXT',
    pageCount: 1,
    score: null,
    correct: null,
    total: 8,
    done: false,
    infoRows: [
      ['File type', 'TXT'],
      ['File size', formatChars(charCount)],
      ['Pages', '1'],
      ['Language', 'English'],
      ['Processed at', processedAt],
    ],
    summary: {
      pages: '1 pages condensed',
      title: 'Pasted Text',
      authors: 'Uploaded document · 2026',
      body: [
        'This 1-page document explores the subject matter presented in "Pasted text". The AI has processed the full text and identified the core themes and arguments.',
        'The document presents a structured analysis with clear sections covering background, methodology (where applicable), findings, and recommendations for further study or practice.',
        'Based on the content, the author(s) advance a position supported by evidence and examples throughout. Understanding the key claims will prepare you for the comprehension quiz.'
      ],
      takeaways: [
        'The document presents core ideas over 1 pages that form the basis of the quiz questions below.',
        'Key claims are supported by evidence, examples, or theoretical frameworks drawn from the text.',
        'Review the summary carefully before taking the quiz to maximise your comprehension score.'
      ],
    },
    strengths: [],
    weaknesses: [],
    studyNext: [],
    questions: [],
  };
}

/**
 * Build the summary metadata object from the first attached file.
 * Returns a document object populated with file name, type, size label,
 * and generated info rows for the left-panel document card.
 *
 * @returns {object}  Current document object extended with file metadata
 */
function buildUploadedFileSummary() {
  const file = uploadedFiles[0];
  if (!file) return { ...currentDoc };
  const ext = file.name.split('.').pop().toUpperCase();
  const sizeLabel = file.size < 1024 * 1024 ? `${Math.max(1, Math.round(file.size / 1024))} KB` : `${(file.size / (1024 * 1024)).toFixed(1)} MB`;
  const processedAt = getProcessedTime();
  return {
    ...currentDoc,
    title: file.name,
    meta: `.${ext.toLowerCase()} · ${sizeLabel}`,
    fileType: ext,
    pageCount: currentDoc.pageCount || 1,
    infoRows: [
      ['File type', ext],
      ['File size', sizeLabel],
      ['Pages', String(currentDoc.pageCount || 1)],
      ['Language', 'English'],
      ['Processed at', processedAt],
    ],
  };
}

/**
 * Resolve the current document object from whichever input mode is active:
 * pasted text, uploaded file, or the default currentDoc.
 *
 * @returns {object}  Document payload ready for rendering
 */
function buildCurrentDocument() {
  if (isTextOnlyUpload()) return buildPastedSummary(document.getElementById('paste-area').value.trim());
  if (uploadedFiles.length > 0) return buildUploadedFileSummary();
  return { ...currentDoc };
}

/**
 * Render the left-panel document-information card showing file type, title,
 * metadata rows, and an "Upload new document" button.
 */
function renderDocumentInfo() {
  const mount = document.getElementById('upload-summary-shell');
  if (!mount || !currentDoc) return;
  mount.innerHTML = `
    <div class="doc-info-card">
      <div class="file-icon-box" style="width:64px;height:72px;font-size:13px">${currentDoc.fileType || 'TXT'}</div>
      <div class="doc-info-main">
        <div class="doc-info-name">${currentDoc.title}</div>
        <div class="doc-info-meta">${currentDoc.meta || ''}</div>
      </div>
      <span class="badge badge-green">Processed</span>
    </div>
    <div class="doc-info-rows">
      ${(currentDoc.infoRows || []).map(([key, value]) => `
        <div class="doc-info-row">
          <div class="doc-info-key">${key}</div>
          <div class="doc-info-value">${value}</div>
        </div>
      `).join('')}
    </div>
    <button class="btn doc-upload-btn" onclick="resetUpload()">Upload new document</button>
  `;
}

/**
 * Toggle the left upload panel between its expanded input layout and
 * the compact summary-info layout.
 *
 * @param {boolean} active  True = summary mode, False = input mode
 */
function setSummaryMode(active) {
  const panel = document.querySelector('.panel-left');
  panel.classList.toggle('summary-mode', active);
  document.getElementById('upload-panel-label').textContent = active ? 'Document info' : 'Upload document';
}

/**
 * Synchronise the compact file-status card (shown when the panel is
 * collapsed) with the active document's name, extension, and quiz state.
 */
function syncCompactFile() {
  const compactName = document.getElementById('compact-file-name');
  const compactMeta = document.getElementById('compact-file-meta');
  const compactIcon = document.getElementById('compact-file-icon');
  const hasFiles = uploadedFiles.length > 0;
  const ext = hasFiles ? uploadedFiles[0].name.split('.').pop().toUpperCase() : (currentDoc.fileType || 'TXT');
  compactIcon.textContent = ext;
  compactName.textContent = currentDoc && currentDoc.title ? currentDoc.title : getActiveUploadLabel();
  compactMeta.textContent = quizMode ? 'Quiz in progress' : 'Summary ready';
}

/**
 * Collapse or expand the left upload panel while the quiz is active,
 * revealing the compact status card.
 *
 * @param {boolean} collapsed  True to collapse, False to restore
 */
function setUploadCollapsed(collapsed) {
  document.querySelector('.panel-left').classList.toggle('compact', collapsed);
  syncCompactFile();
  const compact = document.getElementById('upload-compact-file');
  compact.classList.toggle('live', collapsed);
}

/* ── Document Processing ────────────────────────────────────────────────────── */

/**
 * Render an error panel when the uploaded PDF cannot be read (e.g. scanned
 * or image-based). Shows actionable suggestions and retry buttons.
 *
 * @param {object} data  Response from the API containing .user_message and .suggestions
 */
function showPdfReadError(data) {
  const suggestions = (data.suggestions || [
    'Use a text-based PDF (not a scan)',
    'Copy and paste the text directly using the text input below',
    'Convert the PDF to Word first, then re-export as PDF',
    'If it is a scanned document, run OCR software on it first'
  ]);

  const suggestionsHtml = suggestions.map(s =>
    `<div style="display:flex;align-items:flex-start;gap:9px;padding:10px 13px;border:0.5px solid rgba(240,237,232,0.08);border-radius:6px;background:rgba(240,237,232,0.03);font-size:12px;color:rgba(240,237,232,0.4);line-height:1.55;margin-bottom:6px">
      <span style="color:#C8B89A;flex-shrink:0">→</span>${s}
    </div>`
  ).join('');

  const rightPanel = document.getElementById('right-panel');
  if (rightPanel) {
    rightPanel.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;gap:16px">
        <div style="width:52px;height:52px;border-radius:12px;background:rgba(200,100,80,0.1);border:0.5px solid rgba(200,100,80,0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="rgba(200,100,80,0.8)" stroke-width="1.3">
            <path d="M4 6h10l5 5v9H4V6z"/>
            <path d="M14 6v5h5"/>
            <path d="M11 10v5M11 17v.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div style="font-family:var(--serif,Georgia);font-size:20px;letter-spacing:-0.3px;line-height:1.3;color:rgba(240,237,232,0.9)">
          This PDF can't be read
        </div>
        <div style="font-size:13px;color:rgba(240,237,232,0.4);line-height:1.78;max-width:44ch">
          ${data.user_message || data.detail || 'The file appears to be a scanned or image-based PDF with no selectable text.'}
        </div>
        <div style="width:100%;max-width:380px;margin-top:4px">
          <div style="font-size:10px;letter-spacing:1.1px;text-transform:uppercase;color:rgba(240,237,232,0.25);margin-bottom:10px;text-align:left">What you can do</div>
          ${suggestionsHtml}
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:6px">
          <button class="btn btn-primary" onclick="resetUploadForNewFile()">Upload a different file</button>
          <button class="btn" onclick="switchToTextInput()">Paste text instead</button>
        </div>
      </div>`;
  }

  // Also show a toast
  showToast('PDF could not be read — it may be a scan or image-based file');
}

/**
 * Reset the upload area so the user can pick a new file after a failed upload,
 * clearing the file input and restoring the right panel to its empty state.
 */
function resetUploadForNewFile() {
  const fileInput = document.getElementById('file-input') || document.querySelector('input[type="file"]');
  if (fileInput) { fileInput.value = ''; }
  // Reset right panel to empty state
  const rightPanel = document.getElementById('right-panel');
  if (rightPanel) {
    rightPanel.innerHTML = '<div class="empty-state"><svg class="empty-icon" width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.1"><path d="M10 6h14l8 8v22H10V6z"/><path d="M24 6v8h8"/><path d="M14 18h12M14 24h12M14 30h8"/></svg><div class="empty-text">Upload a document to get started.</div><div class="empty-sub">PDF, TXT, or DOCX</div></div>';

/**
 * Switch the interface to text-input mode, scrolling to and focusing the
 * paste textarea for the user to enter document content manually.
 */
function switchToTextInput() {
  // Attempt to activate a dedicated text-mode tab if one exists
  const textTab = document.querySelector('[data-tab="text"]') || document.getElementById('tab-text') || document.getElementById('paste-tab');
  if (textTab) { textTab.click(); return; }
  // Fallback: scroll to and focus any textarea on the page

// ── Multi-file queue processing ──────────────────────────────────────────────

/**
 * Process all queued files sequentially. For each file, POST to /api/upload,
 * poll for quiz readiness, and collect results. After all files are processed,
 * render individual summaries or a final multi-file results view.
 *
 * @returns {Promise<void>}
 */
async function processMultiQueue() {
  _multiQueue = [...uploadedFiles];
  _multiResults = [];
  _multiAllData = [];
  _multiCurrent = 0;
  document.getElementById('btn-process').disabled = true;
  document.getElementById('btn-rescan').style.display = 'none';

  for (let i = 0; i < _multiQueue.length; i++) {
    _multiCurrent = i;
    const file = _multiQueue[i];
    showMultiProgress(i, _multiQueue.length, file.name);

    try {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('title', file.name.replace(/\.[^/.]+$/, ''));
      const token = localStorage.getItem('token') || '';

      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token },
        body: formData,
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Upload failed');

      // Poll for quiz if needed
      if (data.quizJobId && !data.quizReady) {
        data.quizData = await pollQuizReady(data.quizJobId);
        data.quizReady = true;
      }

      data._fileName = file.name.replace(/\.[^/.]+$/, '');
      _multiAllData.push(data);
      _multiResults.push({ title: data._fileName, historyId: data.historyId, success: true });
    } catch (err) {
      _multiResults.push({ title: file.name.replace(/\.[^/.]+$/, ''), historyId: null, success: false, error: err.message });
    }
  }

  if (_multiAllData.length) {
    _multiMode = true;
    _multiIndex = 0;
    showMultiFileSummary(0);
    document.getElementById('btn-rescan').style.display = 'flex';
    document.getElementById('btn-process').style.display = 'none';
    var btnQuiz = document.getElementById('btn-quiz');
    if (btnQuiz) btnQuiz.style.display = 'none';
  } else {
    showMultiComplete();
  }
}



/**

 *
 * @param {number} current  0-based index of the file being processed

 */

      </div>

        ${escapeHtml(filename)}
      </div>
      <div style="font-size:13px;color:var(--cream-40);margin-bottom:32px">Generating summary and quiz…</div>
      <div style="background:var(--border);border-radius:4px;height:3px;overflow:hidden">

/**
 * Display the summary for a specific file from the multi-queue results.
 * Saves the history ID and quiz data to localStorage for cross-page access.
 *
 * @param {number} idx  Index into _multiAllData
 */
function showMultiFileSummary(idx) {
  var doc = _multiAllData[idx];
  if (!doc) return;
  if (doc.historyId) localStorage.setItem('currentHistoryId', doc.historyId);
  if (doc.quizData && doc.quizData.length) localStorage.setItem('currentQuiz', JSON.stringify(doc.quizData));
  showSummary(doc);
}

/**
 * Advance to the next file in the multi-queue results, or show the final
 * aggregated results page when all files have been reviewed.
 */
function _multiNextFile() {
  _multiIndex++;
  if (_multiIndex < _multiAllData.length) {
    showMultiFileSummary(_multiIndex);
  } else {
    showMultiFinalResults();
  }
}

/**
 * Poll the backend quiz-status endpoint until the quiz generation job
 * completes. Used in the multi-file queue path. Times out after 30
 * attempts (90 seconds).
 *
 * @param {string} jobId  The quiz generation job ID
 * @returns {Promise<object[]>}  Array of quiz questions, or empty on failure
 */
async function pollQuizReady(jobId) {
  const token = localStorage.getItem('token') || '';
  for (let i = 0; i < 30; i++) {
    await new Promise(r => setTimeout(r, 3000));
    try {
      const res = await fetch('/api/upload/quiz-status/' + jobId, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const d = await res.json();
      if (d.status === 'done') return d.quiz || [];
      if (d.status === 'error') return [];
    } catch (_) {}
  }
  return [];
}

/**

 * in flight. The right panel is set to a loading spinner.

 * @param {File}  file      The file being processed (or null for pasted text)
 * @param {boolean} hasPaste Whether the upload source is pasted text
 */
function showCompactFileDuringProcessing(file, hasPaste) {
  const panel = document.querySelector('.panel-left');
  if(!panel)return;
  setSummaryMode(true);
  panel.classList.add('compact');
  const sizeLabel = file ? (file.size < 1024 * 1024 ? Math.max(1, Math.round(file.size / 1024)) + ' KB' : (file.size / (1024 * 1024)).toFixed(1) + ' MB') : 'N/A';
  const ext = file ? file.name.split('.').pop().toUpperCase() : 'TXT';
  const name = file ? file.name : 'Pasted text';
  const mount = document.getElementById('upload-summary-shell');
  if(mount){
    mount.innerHTML = '<div class="doc-info-card">'
      + '<div class="file-icon-box" style="width:64px;height:72px;font-size:13px">' + ext + '</div>'
      + '<div class="doc-info-main">'
      +   '<div class="doc-info-name">' + name + '</div>'
      +   '<div class="doc-info-meta">.' + ext.toLowerCase() + ' \u00b7 ' + sizeLabel + '</div>'
      + '</div>'
      + '<span class="badge badge-green" style="background:rgba(200,184,154,0.12);color:var(--gold)">Processing\u2026</span>'
      + '</div>';
  }
  const compactName = document.getElementById('compact-file-name');
  const compactIcon = document.getElementById('compact-file-icon');
  const compactMeta = document.getElementById('compact-file-meta');
  if(compactIcon) compactIcon.textContent = ext;
  if(compactName) compactName.textContent = name;
  if(compactMeta) compactMeta.textContent = 'Processing\u2026';

  document.getElementById('right-panel').innerHTML = '<div class="loading-state"><div class="loading-shell"><div class="loading-label">Generating your summary</div><div class="loading-spinner"></div><div class="loading-text">This may take up to a minute\u2026</div></div></div>';
}

/**
 * Main document processing entry point.
 *
 * Phase 1 — Single PPTX: Redirect to pptx-session.html for slide-by-slide study.
 * Phase 2 — Multi-file: Dispatch to processMultiQueue().
 * Phase 3 — Single file/text: POST to /api/upload, show summary immediately,
 *            and poll for quiz on Mac 2 via pollForUploadQuiz().
 *
 * @returns {Promise<void>}
 */
async function processDocument() {
  // Single PPTX file — redirect to pptx-session for slide-by-slide study
  if (uploadedFiles.length === 1 && isPro()) {
    var singleFile = uploadedFiles[0];
    var ext = '.' + singleFile.name.split('.').pop().toLowerCase();
    if (ext === '.ppt' || ext === '.pptx') {
      document.getElementById('btn-process').disabled = true;
      var pptxForm = new FormData();
      pptxForm.append('file', singleFile);
      try {
        var pptxRes = await fetch('/api/pptx/upload', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + (localStorage.getItem('token') || '') },
          body: pptxForm,
        });
        var pptxData = await pptxRes.json();
        if (pptxRes.ok && pptxData.doc_id) {
          window.location.href = 'pptx-session.html?doc=' + pptxData.doc_id;
          return;
        }
      } catch (_) {}
      showToast('PPTX upload failed, trying standard upload…');
    }
  }
  // Multi-file: if Pro and more than 1 file, queue them all
  if (isPro() && uploadedFiles.length > 1) {
    await processMultiQueue();
    return;
  }
  // Phase 1: Set initial loading UI state.
  localStorage.removeItem('currentQuiz');
  document.getElementById('btn-process').disabled = true;
  const file = uploadedFiles[0];
  const hasPaste = hasPastedText();
  const _token = localStorage.getItem('token') || '';
  showCompactFileDuringProcessing(file, hasPaste);

  // Phase 2: Build FormData payload for file or pasted text.
  const formData = new FormData();
  if (file) {
    formData.append('file', file);
    formData.append('title', file.name.replace(/\.[^/.]+$/, ''));
  } else if (hasPaste) {
    const pastedText = document.getElementById('paste-area') ? document.getElementById('paste-area').value : '';
    formData.append('text_content', pastedText);
    formData.append('title', 'Pasted text');
  }

  // Phase 3: Run animated progress and network request in parallel.
  // Progress animation — honest pacing, stays at 85% until summary returns
  let step = 0;
  const progressMarks = [12, 35, 60, 85];
  updateProcessingState(progressMarks[0], 0);  // show 12% immediately
  processingTimer = setInterval(function() {
    if (step < progressMarks.length - 1) {
      step++;
      updateProcessingState(progressMarks[step], step);
    }
    // stays at 85% — never hits 100 until fetch actually completes
  }, 25000);  // advance every 25s — realistic for a 90s summary

  const fetchPromise = fetch('/api/upload', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + _token },
    body: formData
  });

  // Phase 4: Wait for summary (not quiz) — show it immediately when ready
  try {
    const fetchRes = await fetchPromise;
    clearInterval(processingTimer);
    processingTimer = null;

    const data = await fetchRes.json();

    if (fetchRes.status === 401 || fetchRes.status === 403) {
      localStorage.removeItem('token');
      window.location.href = 'index.html';
      return;
    }
    if (!fetchRes.ok) {
      if (fetchRes.status === 422 && data.error === 'unreadable_pdf') {
        document.getElementById('btn-process').disabled = false;
        showPdfReadError(data);
        return;
      }
      throw new Error(data.detail || data.message || 'Upload failed');
    }

    // Phase 5: Show summary immediately — don't wait for quiz
    if (data.historyId) localStorage.setItem('currentHistoryId', data.historyId);

    showSummary(data);
    document.getElementById('btn-rescan').style.display = 'flex';
    document.getElementById('btn-process').style.display = 'none';

    const btnQuiz = document.getElementById('btn-quiz');

    // If quiz is already ready (legacy path), enable immediately
    if (data.quizReady && data.quizData && data.quizData.length) {
      localStorage.setItem('currentQuiz', JSON.stringify(data.quizData));
      btnQuiz.style.display = 'flex';
      btnQuiz.disabled = false;
      btnQuiz.textContent = 'Start quiz →';
    } else if (data.quizJobId) {
      // Quiz is generating on Mac 2 — show pending state and poll
      btnQuiz.style.display = 'flex';
      btnQuiz.disabled = true;
      btnQuiz.textContent = 'Quiz generating…';
      pollForUploadQuiz(data.quizJobId, data.historyId, btnQuiz);
    } else {
      btnQuiz.style.display = 'none';
    }

  } catch (e) {
    clearInterval(processingTimer);
    processingTimer = null;
    document.getElementById('btn-process').disabled = false;
    showToast(e.message || 'Processing failed — please try again');
    document.getElementById('right-panel').innerHTML = '<div class="empty-state"><svg class="empty-icon" width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.1"><path d="M10 6h14l8 8v22H10V6z"/><path d="M24 6v8h8"/><path d="M14 18h12M14 24h12M14 30h8"/></svg><div class="empty-text">Processing failed.</div><div class="empty-sub">Please try again.</div></div>';
  }
}

// ── Poll for quiz from Mac 2 ───────────────────────────────────────────────

/**
 * Poll the quiz-status endpoint while the quiz is being generated on the
 * Mac 2 worker. Updates the quiz button from "Quiz generating…" to
 * "Start quiz →" once ready. Times out after 80 attempts (~4 minutes).
 *
 * @param {string}   jobId     Quiz generation job ID from Mac 2
 * @param {string}   historyId History item ID for quiz persistence
 * @param {Element}  btnQuiz   The DOM element for the start-quiz button
 */
function pollForUploadQuiz(jobId, historyId, btnQuiz) {
  var attempts = 0;
  var interval = setInterval(async function() {
    attempts++;
    if (attempts > 80) {  // 80 × 3s = 4 min timeout
      clearInterval(interval);
      btnQuiz.disabled = false;
      btnQuiz.textContent = 'Quiz unavailable';
      showToast('Quiz generation timed out — try re-uploading');
      return;
    }
    try {
      var token = localStorage.getItem('token') || '';
      var res = await fetch('/api/upload/quiz-status/' + jobId, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      var data = await res.json();
      if (data.status === 'done' && data.quiz && data.quiz.length) {
        clearInterval(interval);
        setQuizData(data.quiz);
        localStorage.setItem('currentQuiz', JSON.stringify(quizData));
        btnQuiz.disabled = false;
        btnQuiz.textContent = 'Start quiz →';
        if (!quizMode && currentDoc && currentDoc.summary) showSummary(currentDoc);
        showToast('Quiz ready — ' + data.quiz.length + ' questions generated');
      } else if (data.status === 'error') {
        clearInterval(interval);
        btnQuiz.disabled = false;
        btnQuiz.textContent = 'Quiz failed — retry';
        showToast('Quiz generation failed: ' + (data.error || 'unknown error'));
      }
      // still pending — keep polling
    } catch (err) {
      // network hiccup — keep polling
    }
  }, 3000);
}

/**
 * Render right-panel processing skeleton with a multi-step progress tracker.
 * Uses window.LN (if available) for animated panel transitions, otherwise
 * falls back to direct innerHTML assignment.
 */
function showProcessingState() {
  const html = `
    <div class="loading-state">
      <div class="loading-shell">
        <div class="loading-label">Processing document</div>
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loading-text">Reading your document…</div>
        <div class="loading-bar"><div class="loading-bar-fill" id="loading-bar-fill"></div></div>
        <div class="loading-pct" id="loading-pct">0%</div>
        <div class="loading-steps" id="loading-steps">
          <div class="loading-step active"><span class="loading-step-dot"></span><span>Reading pages and extracting content</span></div>
          <div class="loading-step"><span class="loading-step-dot"></span><span>Identifying key concepts and themes</span></div>
          <div class="loading-step"><span class="loading-step-dot"></span><span>Building your summary and quiz set</span></div>
          <div class="loading-step"><span class="loading-step-dot"></span><span>Finalising learning state</span></div>
        </div>
      </div>
    </div>`;
  if (window.LN) window.LN.swapPanelContent(document.getElementById('right-panel'), html, 'forward');
  else document.getElementById('right-panel').innerHTML = html;
}

/**
 * Update the progress bar width, percentage label, step description, and
 * the active/done visual state of each processing step in the loading UI.
 *
 * @param {number} progress     Percentage (0–100) for the bar width
 * @param {number} activeIndex  Index of the currently active step label
 */
function updateProcessingState(progress, activeIndex) {
  const labels = [
    'Reading your document…',
    'Finding the most relevant ideas…',
    'Writing your summary and quiz…',
    'Almost ready…'
  ];
  const bar = document.getElementById('loading-bar-fill');
  const pct = document.getElementById('loading-pct');
  const text = document.getElementById('loading-text');
  if (bar) bar.style.width = progress + '%';
  if (pct) pct.textContent = progress + '%';
  if (text) text.textContent = labels[Math.min(activeIndex, labels.length - 1)];
  document.querySelectorAll('#loading-steps .loading-step').forEach((node, idx) => {
    node.classList.toggle('done', idx < activeIndex);
    node.classList.toggle('active', idx === activeIndex);
  });
}

/**
 * Render the generated summary panel in the right content area and prepare
 * the quiz entry-point controls. Supports multi-mode file header display
 * and uses window.LN for animated transitions when available.
 *
 * @param {object} data  Document payload containing .summary, .quizData, etc.
 */
function showSummary(data) {
  currentDoc = Object.assign({}, data, { done: false, score: null, correct: null });
  setQuizData(data.quizData || data.quizFull || []);
  setSummaryMode(true);
  renderDocumentInfo();
  const quizReady = quizData.length > 0;
  var multiHeader = '';
  if (_multiMode) {
    multiHeader = '<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:16px;border-bottom:0.5px solid var(--border)">' +
      '<span style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);background:rgba(200,184,154,0.1);padding:3px 10px;border-radius:4px">File ' + (_multiIndex + 1) + ' of ' + _multiAllData.length + '</span>' +
      '<span style="font-size:14px;color:var(--cream-40)">' + escapeHtml(data._fileName || '') + '</span>' +
    '</div>';
  }
  const summaryHTML = multiHeader + `<div class="summary-panel">${renderSummaryMarkup(currentDoc, {
    ctaLabel: quizReady ? 'Take quiz →' : 'Quiz generating…',
    ctaHandler: quizReady ? 'startQuiz()' : "showToast('Quiz is still generating — this will update automatically')",
    ctaHint: quizReady ? quizData.length + ' questions ready' : 'Quiz still generating'
  })}</div>`;
  if (window.LN) window.LN.swapPanelContent(document.getElementById('right-panel'), summaryHTML, 'backward');
  else document.getElementById('right-panel').innerHTML = summaryHTML;
  const curtain = document.getElementById('curtain-panel');
  if(curtain){
    curtain.innerHTML = summaryHTML;
    requestAnimationFrame(() => curtain.classList.add('curtain-visible'));
  }
  syncCompactFile();
}

/* ── Quiz Engine ────────────────────────────────────────────────────────────── */

/**
 * Initialise quiz mode, reset answer tracking, collapse the upload panel,
 * and render the first question. Falls back to localStorage if quizData
 * hasn't been populated yet.
 */
function startQuiz() {
  if (!quizData.length) {
    try {
      setQuizData(JSON.parse(localStorage.getItem('currentQuiz') || '[]'));
    } catch (_) {
      setQuizData([]);
    }
  }
  if (!quizData.length) {
    showToast('Quiz is still generating — please wait a moment');
    return;
  }
  quizMode = true; currentQ = 0; answers = []; answered = false;
  document.getElementById('btn-quiz').style.display = 'none';
  setUploadCollapsed(true);
  renderQuestion('forward');
}

/**
 * Render the current quiz question inside the right panel (or curtain).
 * Shows progress bar, question text, A/B/C/D options, and navigation
 * (skip / next). Supports animated transitions via window.LN.
 *
 * @param {'forward'|'backward'} [direction='forward']  Transition direction
 */
function renderQuestion(direction='forward') {
  answered = false;
  const q = quizData[currentQ];
  if (!q) {
    quizMode = false;
    showToast('Quiz is not ready yet');
    showSummary(currentDoc);
    return;
  }
  const pct = Math.round((currentQ/quizData.length)*100);
  const html = `
    <div class="quiz-container">
      <div class="quiz-q-header">
        <span class="quiz-q-num">Question ${currentQ+1} of ${quizData.length}</span>
        <span style="font-size:11px;color:var(--cream-25)">${quizData.length - currentQ - 1} remaining</span>
      </div>
      <div class="quiz-q-prog"><div class="quiz-q-prog-fill" style="width:${pct}%"></div></div>
      <div class="quiz-question">${escapeHtml(q.q)}</div>
      <div class="quiz-options">
        ${q.opts.map((o,i) => `<button type="button" class="quiz-opt" onclick="selectAnswer(${i})" id="opt-${i}"><span class="opt-letter">${'ABCD'[i]}</span>${escapeHtml(o)}</button>`).join('')}
      </div>
      <div class="quiz-feedback-inline" id="qfeedback"></div>
      <div class="quiz-nav">
        <button type="button" class="btn" onclick="skipQuestion()" id="btn-skip" style="font-size:12px">Skip</button>
        <button type="button" class="btn btn-primary" id="btn-next" style="display:none" onclick="nextQuestion()">
          ${currentQ+1 < quizData.length ? 'Next question →' : 'See results →'}
        </button>
      </div>
    </div>`;
  var panel = document.getElementById('curtain-panel');
  if(panel && panel.classList.contains('curtain-visible')){
    panel.innerHTML = html;
  }else{
    if (window.LN) window.LN.swapPanelContent(document.getElementById('right-panel'), html, direction);
    else document.getElementById('right-panel').innerHTML = html;
    if(panel){
      panel.innerHTML = html;
      requestAnimationFrame(() => panel.classList.add('curtain-visible'));
    }
  }
}

/**
 * Record the user's selected answer index, visually highlight correct/wrong
 * options, disable further clicks on this question, and reveal the explanation
 * feedback. Also toggles the "Next" button visibility.
 *
 * @param {number} i  Index of the selected option (0–3)
 */
function selectAnswer(i) {
  if (answered) return;
  const q = quizData[currentQ];
  if (!q || !Array.isArray(q.opts)) {
    showToast('Quiz question is not ready — please try again');
    return;
  }
  answered = true;
  answers.push({ chosen: i, correct: q.correct });
  const mount = getQuizMount();
  const fb = mount.querySelector('#qfeedback');
  mount.querySelectorAll('.quiz-opt').forEach((el,j) => {
    if (j === i) el.classList.add('selected');
    if (j === q.correct) el.classList.add('correct');
    else if (j === i && i !== q.correct) el.classList.add('wrong');
    el.style.pointerEvents = 'none';
  });
  if (fb) {
    if (i === q.correct) { fb.className='quiz-feedback-inline correct'; fb.textContent='Correct — '+q.explanation; }
    else { fb.className='quiz-feedback-inline wrong'; fb.textContent='Incorrect. '+q.explanation; }
  }
  const skipBtn = mount.querySelector('#btn-skip');
  const nextBtn = mount.querySelector('#btn-next');
  if (skipBtn) skipBtn.style.display = 'none';
  if (nextBtn) nextBtn.style.display = 'inline-flex';
}

/**
 * Skip the current question by recording a sentinel answer (chosen: -1)
 * and advancing to the next question or results.
 */
function skipQuestion() {
  if (answered) return;
  const q = quizData[currentQ];
  if (!q) {
    showToast('Quiz question is not ready — please try again');
    return;
  }
  answered = true;
  answers.push({ chosen: -1, correct: q.correct });
  nextQuestion();
}

/**
 * Advance to the next question in the quiz, or render the final results
 * panel when all questions have been answered.
 */
function nextQuestion() {
  currentQ++;
  if (currentQ >= quizData.length) { showQuizResults(); return; }
  renderQuestion('forward');
}

/* ── Results and Persistence ───────────────────────────────────────────────── */

/**
 * Render the quiz results panel showing the score ring, per-question
 * correct/wrong indicators, and persistence controls.
 *
 * Phase 1: Calculate score and render result UI (score ring + question list).
 * Phase 2: Build per-question details for persistence.
 * Phase 3: POST answers to /api/history/:id/submit-quiz to persist results.
 * Phase 4: Fallback to local results view if backend save fails.
 *
 * @returns {Promise<void>}
 */
async function showQuizResults() {
  // Phase 1: Calculate score and render result UI.
  const correctCount = answers.filter(a => a.chosen === a.correct).length;
  const pct = Math.round((correctCount/quizData.length)*100);
  const circ = 251.2; const offset = circ - (pct/100)*circ;
  const html = `
    <div class="quiz-results">
    <div style="text-align:center;margin-bottom:24px" class="result-step">
      <svg width="100" height="100" viewBox="0 0 110 110">
        <circle cx="55" cy="55" r="40" fill="none" stroke="var(--border)" stroke-width="7"/>
        <circle cx="55" cy="55" r="40" fill="none" stroke="var(--gold)" stroke-width="7" stroke-linecap="round"
          stroke-dasharray="${circ}" stroke-dashoffset="${offset}" transform="rotate(-90 55 55)" style="transition:stroke-dashoffset 1s ease"/>
        <text x="55" y="55" text-anchor="middle" dominant-baseline="central" font-family="DM Serif Display,serif" font-size="22" fill="currentColor">${pct}%</text>
      </svg>
      <div style="font-size:12px;color:var(--cream-25);margin-top:4px">${correctCount} of ${quizData.length} correct</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:20px" class="result-step">
      ${quizData.map((q,i) => {
        const a = answers[i]; const isCorrect = a && a.chosen === a.correct;
        return `<div style="padding:10px 14px;border-radius:var(--radius-md);border:0.5px solid ${isCorrect?'rgba(107,158,107,0.22)':'rgba(200,120,80,0.18)'};background:${isCorrect?'rgba(107,158,107,0.04)':'rgba(200,120,80,0.03)'};font-size:12px">
          <span style="color:${isCorrect?'var(--green)':'var(--red-soft)'};margin-right:8px">${isCorrect?'✓':'✗'}</span>
          <span style="color:var(--cream-60)">${q.q.substring(0,60)}…</span>
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:8px;padding-top:16px;border-top:0.5px solid var(--border)" class="result-step">
      <button class="btn" onclick="startQuiz()">Retake quiz</button>
      <button class="btn btn-primary" id="btn-full-results" disabled>Saving…</button>
    </div>
    </div>`;
  var curtain = document.getElementById('curtain-panel');
  if(curtain){
    curtain.innerHTML = html;
    if(!curtain.classList.contains('curtain-visible')){
      requestAnimationFrame(() => curtain.classList.add('curtain-visible'));
    }
    setTimeout(function(){
      var steps = curtain.querySelectorAll('.result-step');
      var ring = curtain.querySelector('circle[stroke="var(--gold)"]');
      if(window.LN){
        window.LN.revealSequence(steps, 110);
        if(ring) window.LN.animateScoreRing(ring, pct);
      }
    }, 220);
  }else{
    if (window.LN) {
      window.LN.swapPanelContent(document.getElementById('right-panel'), html, 'forward');
      setTimeout(function() {
        var p = document.getElementById('right-panel');
        window.LN.revealSequence(p.querySelectorAll('.result-step'), 110);
        var r = p.querySelector('circle[stroke="var(--gold)"]');
        if(r) window.LN.animateScoreRing(r, pct);
      }, 220);
    } else {
      document.getElementById('right-panel').innerHTML = html;
    }
  }

  // Phase 2: Build per-question details for persistence.
  const questionDetails = quizData.map((q, i) => {
    const a = answers[i];
    const chosenIdx = a ? a.chosen : -1;
    const isCorrect = a ? a.chosen === a.correct : false;
    return {
      q: q.q,
      correct: isCorrect,
      your: chosenIdx >= 0 ? q.opts[chosenIdx] : '(skipped)',
      answer: isCorrect ? null : q.opts[q.correct]
    };
  });

  // Phase 3: Persist answers to backend and enable results navigation button.
  try {
    const token = localStorage.getItem('token') || '';
    const historyId = localStorage.getItem('currentHistoryId') || '';
    const userAnswerIndices = answers.map(a => a.chosen);
    let savedId = historyId;
    if (historyId) {
      const saveRes = await fetch('/api/history/' + historyId + '/submit-quiz', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ answers: userAnswerIndices })
      });
      const saved = await saveRes.json();
      savedId = saved._id || historyId;
    }
    const btn = document.getElementById('btn-full-results');
    if (btn) {
      if (_multiMode) {
        var nextLabel = 'Next file →';
        if (_multiIndex >= _multiAllData.length - 1) nextLabel = 'View final results →';
        btn.textContent = nextLabel;
        btn.disabled = false;
        btn.onclick = function() { _multiNextFile(); };
        localStorage.setItem('_multiSaved_' + _multiIndex, JSON.stringify({
          score: pct, correct: correctCount, total: quizData.length,
          weaknesses: [], strengths: ['Quiz completed']
        }));
      } else {
        btn.disabled = false;
        btn.textContent = 'Full results →';
        btn.onclick = function() { window.location.href = 'results.html?id=' + savedId; };
      }
    }
    showToast('Quiz complete — ' + pct + '% saved');
  } catch (e) {
    // Phase 4: Fallback to local results view when backend save fails.
    const btn = document.getElementById('btn-full-results');
    if (btn) {
      if (_multiMode) {
        var nextLabel = 'Next file →';
        if (_multiIndex >= _multiAllData.length - 1) nextLabel = 'View final results →';
        btn.textContent = nextLabel;
        btn.disabled = false;
        btn.onclick = function() { _multiNextFile(); };
        localStorage.setItem('_multiSaved_' + _multiIndex, JSON.stringify({
          score: pct, correct: correctCount, total: quizData.length,
          weaknesses: [], strengths: ['Quiz completed']
        }));
      } else {
        btn.disabled = false;
        btn.textContent = 'Full results →';
        btn.onclick = function() { window.location.href = 'results.html'; };
      }
    }
    showToast('Quiz complete — ' + pct + '%');
  }
}

/**
 * Fully reset the upload workspace: clear multi-queue state, uploaded files,
 * paste area, all transient quiz/processing timers, and restore the right
 * panel to the initial empty-state view.
 */
function resetUpload() {
  _multiMode = false;
  _multiIndex = 0;
  for (var i = 0; i < 10; i++) localStorage.removeItem('_multiSaved_' + i);
  if (processingTimer) {
    clearInterval(processingTimer);
    processingTimer = null;
  }
  uploadedFiles = []; document.getElementById('file-list').innerHTML = '';
  document.getElementById('file-input').value = ''; document.getElementById('paste-area').value = '';
  document.getElementById('breadcrumb-cur').textContent = 'New document';
  document.getElementById('btn-rescan').style.display = 'none'; document.getElementById('btn-quiz').style.display = 'none';
  document.getElementById('btn-process').style.display = 'none'; document.getElementById('btn-process').disabled = false;
  quizMode = false;
  resumedSession = false;
  localStorage.removeItem('currentQuiz');
  currentDoc = { title: '', fileType: 'TXT', pageCount: 1, done: false, score: null, correct: null, total: 8 };
  quizData = [];
  setSummaryMode(false);
  setUploadCollapsed(false);
  document.getElementById('right-panel').innerHTML = `<div class="empty-state"><svg class="empty-icon" width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.1"><path d="M10 6h14l8 8v22H10V6z"/><path d="M24 6v8h8"/><path d="M14 18h12M14 24h12M14 30h8"/></svg><div class="empty-text">Your summary will appear here.</div><div class="empty-sub">Upload a document or paste text to begin.</div></div>`;
  const curtain = document.getElementById('curtain-panel');
  if(curtain){
    curtain.classList.remove('curtain-visible');
    setTimeout(() => { curtain.innerHTML = ''; }, 500);
  }
}

/**
 * Resume the summary/quiz flow from a history item passed via URL query
 * params (?resume=ID&mode=summary|quiz). Fetches the full history record
 * from the backend, restores quiz data, and optionally auto-starts the quiz.
 *
 * @returns {Promise<void>}
 */
async function loadResumedQuizFlow() {
  const params = new URLSearchParams(window.location.search);
  const resumeId = params.get('resume'); // keep as string — MongoDB ObjectID
  const mode = params.get('mode') || 'summary';
  if (!resumeId) return;

  // Show a brief loading state in the right panel while we fetch
  document.getElementById('right-panel').innerHTML = `
    <div class="loading-state">
      <div class="loading-shell">
        <div class="loading-label">Loading document</div>
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading your document\u2026</div>
      </div>
    </div>`;

  try {
    const token = localStorage.getItem('token') || '';
    const res = await fetch('/api/history/' + resumeId, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!res.ok) {
      console.error('[quiz] Failed to load history item:', res.status);
      showToast('Could not load document \u2014 please try again');
      document.getElementById('right-panel').innerHTML = `<div class="empty-state"><svg class="empty-icon" width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.1"><path d="M10 6h14l8 8v22H10V6z"/><path d="M24 6v8h8"/><path d="M14 18h12M14 24h12M14 30h8"/></svg><div class="empty-text">Document not found.</div><div class="empty-sub">It may have been deleted.</div></div>`;
      return;
    }
    const item = await res.json();

    // Store IDs so showQuizResults can submit the quiz
    localStorage.setItem('currentHistoryId', resumeId);
    const resumedQuiz = item.quizFull || item.quizData || [];
    if (resumedQuiz.length) localStorage.setItem('currentQuiz', JSON.stringify(resumedQuiz));

    resumedSession = true;
    const qLen = resumedQuiz.length;
    currentDoc = {
      ...item,
      id: resumeId,      // keep id aligned with legacy getResumeQuizUrl helper
      done: false,
      score: null,
      correct: null,
      total: qLen || item.total || 8
    };
    setQuizData(resumedQuiz);

    if (!quizData.length) {
      console.error('[quiz] No quiz data found for history item:', resumeId);
      showToast('No quiz available for this document');
    }

    currentDoc.infoRows = [
      ['File type', currentDoc.fileType || 'PDF'],
      ['Pages', String(currentDoc.pageCount || 1)],
      ['Language', 'English'],
      ['Processed at', getProcessedTime()],
    ];

    document.getElementById('breadcrumb-cur').textContent = currentDoc.title || 'Document';
    document.getElementById('btn-rescan').style.display = 'flex';
    document.getElementById('btn-process').style.display = 'none';
    document.getElementById('btn-quiz').style.display = (mode === 'quiz' || !quizData.length) ? 'none' : 'flex';
    document.getElementById('btn-process').disabled = false;

    showSummary(currentDoc);
    if (mode === 'quiz' && quizData.length) startQuiz();

  } catch (e) {
    console.error('[quiz] Error loading history item:', e);
    showToast('Could not load document \u2014 please try again');
    document.getElementById('right-panel').innerHTML = `<div class="empty-state"><svg class="empty-icon" width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.1"><path d="M10 6h14l8 8v22H10V6z"/><path d="M24 6v8h8"/><path d="M14 18h12M14 24h12M14 30h8"/></svg><div class="empty-text">Failed to load document.</div><div class="empty-sub">Check your connection and try again.</div></div>`;
  }
}

/* ── Page Bootstrap ─────────────────────────────────────────────────────────── */

/**
 * On DOMContentLoaded, initialise the upload UI (plan tier gate, accept
 * attributes), sync the compact file status, and check for a ?resume= query
 * param to restore a previous session.
 */
document.addEventListener('DOMContentLoaded', () => {
  updateUploadUI();
  syncCompactFile();
  loadResumedQuizFlow();

  const pasteArea = document.getElementById('paste-area');
  if (pasteArea) {
    pasteArea.addEventListener('keydown', function(event) {
      if (event.key !== 'Enter' || event.shiftKey) return;
      const processBtn = document.getElementById('btn-process');
      if (!processBtn || processBtn.style.display === 'none' || processBtn.disabled) return;
      event.preventDefault();
      processDocument();
    });
  }
});
