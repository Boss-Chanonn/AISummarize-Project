<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Learnova — Upload Document</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .upload-layout{display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:calc(100vh - 80px)}
    .panel{padding:36px 40px}
    .panel-left{border-right:0.5px solid var(--border);background:linear-gradient(180deg, rgba(240,237,232,0.04), rgba(240,237,232,0.02))}
    .panel-right{background:linear-gradient(180deg, rgba(240,237,232,0.045), rgba(240,237,232,0.02))}
    .upload-panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}
    .upload-input-shell{transition:grid-template-rows 0.35s cubic-bezier(0.16,1,0.3,1),opacity 0.25s ease}
    .upload-input-shell-inner{overflow:hidden}
    .upload-summary-shell{display:none}
    .panel-left.summary-mode .upload-input-shell{display:none!important}
    .panel-left.summary-mode .upload-summary-shell{display:block}
    .panel-left.compact .upload-summary-shell{display:none}
    .panel-left.compact .upload-input-shell{grid-template-rows:0fr;opacity:0}
    .panel-left.compact .upload-panel-head{margin-bottom:0}
    .upload-compact-file{display:none;padding:14px 16px;border:0.5px solid rgba(200,184,154,0.22);background:rgba(200,184,154,0.06);border-radius:var(--radius-md);align-items:center;gap:12px;animation:fadeUp 0.22s ease}
    .panel-left.compact .upload-compact-file{display:flex}
    .upload-compact-file.live{box-shadow:0 10px 30px rgba(0,0,0,0.12);transform:translateY(0);transition:box-shadow 0.28s ease,transform 0.28s ease}
    .compact-file-name{font-size:13px;color:var(--cream-60);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .compact-file-meta{font-size:11px;color:var(--cream-25);margin-top:2px}
    .doc-info-card{display:flex;align-items:center;gap:18px;padding:22px;border:0.5px solid rgba(200,184,154,0.22);background:rgba(200,184,154,0.06);border-radius:var(--radius-lg);margin-bottom:26px}
    .doc-info-main{min-width:0;flex:1}
    .doc-info-name{font-size:14px;color:var(--cream);font-weight:500}
    .doc-info-meta{font-size:12px;color:var(--cream-25);margin-top:6px}
    .doc-info-rows{display:flex;flex-direction:column}
    .doc-info-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 0;border-bottom:0.5px solid var(--border)}
    .doc-info-row:last-child{border-bottom:none}
    .doc-info-key{font-size:11px;color:var(--cream-25)}
    .doc-info-value{font-size:13px;color:var(--cream-60);text-align:right}
    .doc-upload-btn{width:100%;justify-content:center;margin-top:28px}
    .upload-zone{border:0.5px dashed var(--border-md);border-radius:var(--radius-md);padding:44px 28px;text-align:center;cursor:pointer;transition:border-color 0.15s,background 0.15s;margin-bottom:18px}
    .upload-zone:hover,.upload-zone.drag{border-color:var(--gold);background:rgba(200,184,154,0.03)}
    .upload-icon{margin:0 auto 16px;opacity:0.3;display:block}
    .upload-main{font-size:14px;color:var(--cream-60);margin-bottom:5px}
    .upload-sub{font-size:12px;color:var(--cream-25)}
    #file-input{display:none}
    .or-divider{display:flex;align-items:center;gap:12px;margin:14px 0}
    .or-line{flex:1;height:0.5px;background:var(--border)}
    .or-text{font-size:11px;color:var(--cream-25)}
    .file-list{display:flex;flex-direction:column;gap:6px;margin-top:12px}
    .file-attached{display:flex;align-items:center;gap:10px;padding:10px 13px;background:rgba(200,184,154,0.06);border:0.5px solid rgba(200,184,154,0.22);border-radius:var(--radius-md)}
    .file-icon-box{width:28px;height:32px;background:rgba(200,184,154,0.12);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:var(--gold);flex-shrink:0}
    .file-name{font-size:12px;color:var(--cream-60);flex:1}
    .file-size{font-size:11px;color:var(--cream-25)}
    .file-remove{background:none;border:none;color:var(--cream-25);font-size:14px;cursor:pointer;padding:2px 4px}
    .file-remove:hover{color:var(--red-soft)}
    /* Pro gate banner */
    .pro-gate{background:rgba(200,184,154,0.06);border:0.5px solid rgba(200,184,154,0.22);border-radius:var(--radius-md);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .pro-gate-text{font-size:12px;color:var(--gold)}
    .loading-state{text-align:center;padding:60px 20px}
    .loading-spinner{width:28px;height:28px;border:1.5px solid var(--border-md);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{font-size:14px;color:var(--cream-40);font-family:var(--serif);font-style:italic}
    .loading-shell{max-width:420px;margin:0 auto}
    .loading-label{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--cream-25);margin-bottom:10px}
    .loading-bar{height:5px;border-radius:999px;background:var(--cream-10);overflow:hidden;margin:18px 0 14px}
    .loading-bar-fill{height:100%;width:0;background:linear-gradient(90deg, var(--gold), color-mix(in srgb, var(--gold) 70%, #fff 30%));border-radius:999px;transition:width 0.35s cubic-bezier(0.16,1,0.3,1)}
    .loading-pct{font-size:12px;color:var(--gold);font-family:var(--serif);margin-bottom:16px}
    .loading-steps{display:flex;flex-direction:column;gap:8px;text-align:left}
    .loading-step{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--cream-25);padding:9px 12px;border:0.5px solid var(--border);border-radius:var(--radius-md);background:var(--cream-05)}
    .loading-step.active{color:var(--cream-60);border-color:rgba(200,184,154,0.24);background:rgba(200,184,154,0.06)}
    .loading-step.done{color:var(--green);border-color:rgba(107,158,107,0.22);background:rgba(107,158,107,0.05)}
    .loading-step-dot{width:8px;height:8px;border-radius:50%;background:var(--cream-25);flex-shrink:0}
    .loading-step.active .loading-step-dot{background:var(--gold);box-shadow:0 0 0 6px rgba(200,184,154,0.08)}
    .loading-step.done .loading-step-dot{background:var(--green)}
    .empty-state{text-align:center;padding:60px 20px}
    .empty-icon{opacity:0.15;margin:0 auto 16px;display:block}
    .empty-text{font-size:14px;color:var(--cream-25);font-family:var(--serif);font-style:italic}
    .empty-sub{font-size:12px;color:var(--cream-25);margin-top:6px;opacity:0.6}

    /* Quiz styles */
    .quiz-container{padding:0}
    .quiz-q-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .quiz-q-num{font-size:11px;color:var(--cream-25);letter-spacing:0.5px}
    .quiz-q-prog{height:2px;background:var(--border);border-radius:1px;margin-bottom:28px}
    .quiz-q-prog-fill{height:2px;background:var(--gold);border-radius:1px;transition:width 0.3s}
    .quiz-question{font-family:var(--serif);font-size:18px;font-weight:400;letter-spacing:-0.3px;line-height:1.4;margin-bottom:24px;color:var(--cream)}
    .quiz-options{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
    .quiz-opt{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;background:var(--cream-05);border:0.5px solid var(--border);border-radius:var(--radius-md);cursor:pointer;transition:border-color 0.15s,background 0.15s;text-align:left;width:100%;color:var(--cream-60);font-size:13px;font-family:var(--sans);line-height:1.45}
    .quiz-opt:hover{border-color:var(--gold);color:var(--cream)}
    .quiz-opt.selected{border-color:var(--gold);background:rgba(200,184,154,0.07);color:var(--cream)}
    .quiz-opt.correct{border-color:var(--green);background:rgba(107,158,107,0.08);color:var(--cream)}
    .quiz-opt.wrong{border-color:var(--red-soft);background:rgba(200,120,80,0.06);color:var(--cream)}
    .opt-letter{width:22px;height:22px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:1px}
    .quiz-opt.selected .opt-letter{background:var(--gold);color:var(--bg)}
    .quiz-opt.correct .opt-letter{background:var(--green);color:#fff}
    .quiz-opt.wrong .opt-letter{background:var(--red-soft);color:#fff}
    .quiz-nav{display:flex;justify-content:space-between;align-items:center}
    .quiz-feedback-inline{margin-top:12px;padding:10px 14px;border-radius:var(--radius-md);font-size:12px;line-height:1.6;display:none}
    .quiz-feedback-inline.correct{background:rgba(107,158,107,0.08);border:0.5px solid rgba(107,158,107,0.22);color:var(--green);display:block}
    .quiz-feedback-inline.wrong{background:rgba(200,120,80,0.06);border:0.5px solid rgba(200,120,80,0.2);color:var(--red-soft);display:block}

    @media(max-width:860px){.upload-layout{grid-template-columns:1fr}.panel-left{border-right:none;border-bottom:0.5px solid var(--border)}}
  </style>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount"></div>
  <main class="main-content" style="padding:0">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:0.5px solid var(--border);background:radial-gradient(120% 120% at 0% 0%, rgba(200,184,154,0.07), transparent 42%), linear-gradient(180deg, rgba(240,237,232,0.04), rgba(240,237,232,0.02))">
      <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--cream-25)">
        <a href="dashboard.html" style="color:var(--cream-25)">Dashboard</a>
        <span style="color:var(--border-md)">/</span>
        <span style="color:var(--cream-60)" id="breadcrumb-cur">New document</span>
      </div>
      <div style="display:flex;gap:10px" id="top-actions">
        <button class="btn" id="btn-rescan" style="display:none" onclick="resetUpload()">New upload</button>
        <button class="btn btn-primary" id="btn-quiz" style="display:none" onclick="startQuiz()">Start quiz →</button>
      </div>
    </div>

    <div class="upload-layout">
      <div class="panel panel-left fade-up">
        <div class="upload-panel-head">
          <div class="section-label" style="margin:0" id="upload-panel-label">Upload document</div>
        </div>
        <div class="upload-compact-file" id="upload-compact-file">
          <div class="file-icon-box" id="compact-file-icon">PDF</div>
          <div style="min-width:0;flex:1">
            <div class="compact-file-name" id="compact-file-name">Document ready</div>
            <div class="compact-file-meta" id="compact-file-meta">Quiz in progress</div>
          </div>
        </div>
        <div class="upload-summary-shell" id="upload-summary-shell"></div>

        <div class="upload-input-shell" id="upload-input-shell" style="display:grid;grid-template-rows:1fr">
          <div class="upload-input-shell-inner">
            <!-- Pro multi-file gate -->
            <div id="pro-gate-banner" style="display:none" class="pro-gate">
              <span class="pro-gate-text">Multi-file &amp; PPTX upload — Pro feature</span>
              <button class="btn btn-gold" style="padding:5px 12px;font-size:11px" onclick="openSettings('plan')">Upgrade</button>
            </div>

            <div class="upload-zone" id="drop-zone" onclick="triggerFileInput()"
                 ondragover="handleDrag(event,true)" ondragleave="handleDrag(event,false)" ondrop="handleDrop(event)">
              <svg class="upload-icon" width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1.1">
                <path d="M18 26V14M12 20l6-6 6 6"/>
                <path d="M8 28h20"/><path d="M6 10a4 4 0 014-4h16a4 4 0 014 4"/>
              </svg>
              <div class="upload-main" id="upload-main-text">Drop your file here</div>
              <div class="upload-sub" id="upload-sub-text">PDF or TXT · up to 10 MB</div>
            </div>
            <input type="file" id="file-input" accept=".pdf,.txt" onchange="handleFileInput(this.files)"/>

            <div class="or-divider"><div class="or-line"></div><span class="or-text">or paste text</span><div class="or-line"></div></div>
            <textarea class="input" id="paste-area" rows="4" placeholder="Paste text of your article or notes here…" style="resize:vertical" oninput="checkContent()"></textarea>

            <div class="file-list" id="file-list"></div>

            <button class="btn btn-primary" id="btn-process" style="width:100%;justify-content:center;margin-top:16px;display:none" onclick="processDocument()">
              Summarise with AI →
            </button>
          </div>
        </div>
      </div>

      <div class="panel panel-right fade-up fade-up-2" id="right-panel">
        <div class="empty-state">
          <svg class="empty-icon" width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.1">
            <path d="M10 6h14l8 8v22H10V6z"/><path d="M24 6v8h8"/><path d="M14 18h12M14 24h12M14 30h8"/>
          </svg>
          <div class="empty-text">Your summary will appear here.</div>
          <div class="empty-sub">Upload a document or paste text to begin.</div>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/api.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
document.getElementById('sidebar-mount').innerHTML = renderSidebar('upload');
if (window.pdfjsLib) {
  window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

let uploadedFiles = [];
const uploadConfig = getUploadConfig();
const baseDoc = getLatestResult() || null;
let currentDoc = baseDoc ? { ...baseDoc, done: false, score: null, correct: null } : null;
let resumedSession = false;
let processingTimer = null;
let sourceText = '';
let QUIZ_DATA = baseDoc && Array.isArray(baseDoc.quizData) ? baseDoc.quizData.map(entry => ({ ...entry })) : [];

function isPro() { return LEARNOVA_USER.tier === 'pro'; }

function updateUploadUI() {
  const gate = document.getElementById('pro-gate-banner');
  const fileInput = document.getElementById('file-input');
  const maxSize = uploadConfig.maxFileSizeMb || 10;
  const supported = uploadConfig.supportedFileTypes || { free: ['.pdf', '.txt'], pro: ['.pdf', '.txt', '.pptx', '.ppt'] };
  if (isPro()) {
    fileInput.accept = supported.pro.join(',');
    document.getElementById('upload-sub-text').textContent = `Configured file types · up to ${maxSize} MB · multiple files supported`;
    fileInput.multiple = true;
    gate.style.display = 'none';
  } else {
    fileInput.accept = supported.free.join(',');
    fileInput.multiple = false;
    gate.style.display = 'flex';
    document.getElementById('upload-sub-text').textContent = `Configured file types · up to ${maxSize} MB (free plan)`;
  }
}

function triggerFileInput() { document.getElementById('file-input').click(); }
function handleDrag(e, entering) { e.preventDefault(); document.getElementById('drop-zone').classList.toggle('drag', entering); }
function handleDrop(e) {
  e.preventDefault(); document.getElementById('drop-zone').classList.remove('drag');
  handleFileInput(e.dataTransfer.files);
}
function handleFileInput(files) {
  if (!files || !files.length) return;
  const supported = uploadConfig.supportedFileTypes || { free: ['.pdf', '.txt'], pro: ['.pdf', '.txt', '.pptx', '.ppt'] };
  const allowed = isPro() ? supported.pro : supported.free;
  const maxSizeBytes = (uploadConfig.maxFileSizeMb || 10) * 1024 * 1024;
  const newFiles = Array.from(files).filter(f => {
    const ext = '.' + f.name.split('.').pop().toLowerCase();
    if (!allowed.includes(ext)) { showToast(ext.toUpperCase() + ' upload requires Pro'); return false; }
    if (f.size > maxSizeBytes) { showToast(f.name + ` exceeds ${uploadConfig.maxFileSizeMb || 10} MB limit`); return false; }
    return true;
  });
  if (!isPro() && newFiles.length > 0) uploadedFiles = [newFiles[0]];
  else uploadedFiles = [...uploadedFiles, ...newFiles].slice(0, uploadConfig.maxFiles?.pro || 5);
  renderFileList();
  checkContent();
  document.getElementById('breadcrumb-cur').textContent = uploadedFiles.length === 1 ? uploadedFiles[0].name : uploadedFiles.length + ' files selected';
}
function renderFileList() {
  const list = document.getElementById('file-list');
  const extColor = ext => ext==='pptx'||ext==='ppt'?'#B89AE8':ext==='txt'?'var(--green)':'var(--gold)';
  list.innerHTML = uploadedFiles.map((f,i) => {
    const ext = f.name.split('.').pop().toUpperCase();
    return `<div class="file-attached">
      <div class="file-icon-box" style="color:${extColor(ext.toLowerCase())}">${ext}</div>
      <div style="flex:1;min-width:0"><div class="file-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</div><div class="file-size">${(f.size/1024).toFixed(0)} KB</div></div>
      <button class="file-remove" onclick="removeFile(${i})">✕</button>
    </div>`;
  }).join('');
  syncCompactFile();
}
function removeFile(i) {
  uploadedFiles.splice(i,1);
  renderFileList();
  checkContent();
  document.getElementById('breadcrumb-cur').textContent = uploadedFiles.length === 0 ? 'New document' : (uploadedFiles.length === 1 ? uploadedFiles[0].name : uploadedFiles.length + ' files selected');
}
function checkContent() {
  const hasPaste = document.getElementById('paste-area').value.trim().length > 30;
  const hasFiles = uploadedFiles.length > 0;
  document.getElementById('btn-process').style.display = (hasPaste||hasFiles) ? 'flex' : 'none';
  if (!hasFiles && hasPaste) document.getElementById('breadcrumb-cur').textContent = 'Pasted text';
  if (!hasFiles && !hasPaste) document.getElementById('breadcrumb-cur').textContent = 'New document';
  syncCompactFile();
}

let quizMode = false, currentQ = 0, answers = [], answered = false;

function getActiveUploadLabel() {
  if (uploadedFiles.length === 1) return uploadedFiles[0].name;
  if (uploadedFiles.length > 1) return uploadedFiles.length + ' files selected';
  if (resumedSession && currentDoc && currentDoc.title) return currentDoc.title;
  const pasted = document.getElementById('paste-area').value.trim();
  return pasted ? 'Pasted text' : 'Document ready';
}

function hasPastedText() {
  return document.getElementById('paste-area').value.trim().length > 30;
}

function isTextOnlyUpload() {
  return uploadedFiles.length === 0 && hasPastedText();
}

function formatChars(count) {
  return `${count} chars`;
}

function getProcessedTime() {
  return new Date().toLocaleTimeString('en-NZ', {
    hour: '2-digit',
    minute: '2-digit',
    hour12: true
  }).toLowerCase();
}

function buildPastedSummary(pasted) {
  const charCount = pasted.length;
  return {
    title: 'Pasted text',
    meta: `.txt · ${formatChars(charCount)}`,
    fileMeta: {
      fileType: 'TXT',
      sizeLabel: formatChars(charCount),
      pageCount: 1,
      processedAt: getProcessedTime()
    }
  };
}

function buildUploadedFileSummary() {
  const file = uploadedFiles[0];
  if (!file) return null;
  const ext = file.name.split('.').pop().toUpperCase();
  const sizeLabel = file.size < 1024 * 1024 ? `${Math.max(1, Math.round(file.size / 1024))} KB` : `${(file.size / (1024 * 1024)).toFixed(1)} MB`;
  return {
    title: file.name,
    meta: `.${ext.toLowerCase()} · ${sizeLabel}`,
    fileMeta: {
      fileType: ext,
      sizeLabel,
      pageCount: 1,
      processedAt: getProcessedTime()
    }
  };
}

function buildCurrentDocumentMeta() {
  if (isTextOnlyUpload()) return buildPastedSummary(document.getElementById('paste-area').value.trim());
  if (uploadedFiles.length > 0) return buildUploadedFileSummary();
  if (!currentDoc) return null;
  return {
    title: currentDoc.title,
    meta: currentDoc.meta,
    fileMeta: {
      fileType: currentDoc.fileType || 'TXT',
      sizeLabel: currentDoc.meta || 'Saved session',
      pageCount: currentDoc.pageCount || 1,
      processedAt: getProcessedTime()
    }
  };
}

function renderDocumentInfo() {
  const mount = document.getElementById('upload-summary-shell');
  if (!mount || !currentDoc) return;
  mount.innerHTML = `
    <div class="doc-info-card">
      <div class="file-icon-box" style="width:64px;height:72px;font-size:13px">${currentDoc.fileType || 'TXT'}</div>
      <div class="doc-info-main">
        <div class="doc-info-name">${currentDoc.title}</div>
        <div class="doc-info-meta">${currentDoc.meta || ''}</div>
      </div>
      <span class="badge badge-green">Processed</span>
    </div>
    <div class="doc-info-rows">
      ${(currentDoc.infoRows || []).map(([key, value]) => `
        <div class="doc-info-row">
          <div class="doc-info-key">${key}</div>
          <div class="doc-info-value">${value}</div>
        </div>
      `).join('')}
    </div>
    <button class="btn doc-upload-btn" onclick="resetUpload()">Upload new document</button>
  `;
}

function setSummaryMode(active) {
  const panel = document.querySelector('.panel-left');
  panel.classList.toggle('summary-mode', active);
  document.getElementById('upload-panel-label').textContent = active ? 'Document info' : 'Upload document';
}

function syncCompactFile() {
  const compactName = document.getElementById('compact-file-name');
  const compactMeta = document.getElementById('compact-file-meta');
  const compactIcon = document.getElementById('compact-file-icon');
  const hasFiles = uploadedFiles.length > 0;
  const ext = hasFiles ? uploadedFiles[0].name.split('.').pop().toUpperCase() : (currentDoc.fileType || 'TXT');
  compactIcon.textContent = ext;
  compactName.textContent = currentDoc && currentDoc.title ? currentDoc.title : getActiveUploadLabel();
  compactMeta.textContent = quizMode ? 'Quiz in progress' : 'Summary ready';
}

function setUploadCollapsed(collapsed) {
  document.querySelector('.panel-left').classList.toggle('compact', collapsed);
  syncCompactFile();
  const compact = document.getElementById('upload-compact-file');
  compact.classList.toggle('live', collapsed);
}

// ── Dual-Mac flow ─────────────────────────────────────────────────────────────
// Mac 1 (gpt-oss)     → summary    (synchronous, shows immediately)
// Mac 2 (deepseek-r1) → quiz       (background, polled every 3s)
let _cancelQuizPoll = null;

async function processDocument() {
  const docMeta = buildCurrentDocumentMeta();
  if (!docMeta) return;
  try {
    sourceText = await resolveSourceText();
  } catch (error) {
    showToast(error.message);
    return;
  }
  if (sourceText.length < (uploadConfig.minTextLength || 200)) {
    showToast(`Provide at least ${uploadConfig.minTextLength || 200} characters of text`);
    return;
  }
  showProcessingState();
  document.getElementById('btn-process').disabled = true;
  updateProcessingState(18, 0);

  try {
    // ── Step 1: summary from Mac 1 (blocks ~5-15s) ──
    const { summary: summaryResponse, job_id: jobId } = await LEARNOVA_API.summarizeAndQueueQuiz({
      title: docMeta.title,
      text: sourceText,
      question_count: APP_CONFIG.api?.questionCount || 6,
    });

    // ── Step 2: summary is ready — show it now ──
    updateProcessingState(70, 2);
    const placeholderQuiz = { questions: [], question_count: 0, title: docMeta.title };
    currentDoc = LEARNOVA_API.buildHistoryRecord({
      id: Date.now(),
      title: docMeta.title,
      meta: docMeta.meta,
      sourceText,
      summaryResponse,
      quizResponse: placeholderQuiz,
      fileMeta: docMeta.fileMeta
    });
    QUIZ_DATA = [];
    upsertHistoryItem(currentDoc);
    showSummary();
    document.getElementById('btn-rescan').style.display = 'flex';
    document.getElementById('btn-process').style.display = 'none';

    // Show "quiz generating" state on the quiz button
    const btnQuiz = document.getElementById('btn-quiz');
    btnQuiz.style.display = 'flex';
    btnQuiz.disabled = true;
    btnQuiz.textContent = 'Quiz generating…';

    // ── Step 3: poll Mac 2 for the quiz (every 3s) ──
    _cancelQuizPoll = LEARNOVA_API.pollForQuiz(jobId, {
      onPending: () => {
        // pulse the button text so user knows it's working
        const dots = btnQuiz.textContent.endsWith('…') ? '' : '…';
        btnQuiz.textContent = 'Quiz generating' + dots;
      },
      onDone: (quizResponse) => {
        QUIZ_DATA = (quizResponse.questions || []).map(LEARNOVA_API.formatQuestionForUI);
        currentDoc.quizData = QUIZ_DATA;
        currentDoc.initialQuiz = {
          title: quizResponse.title,
          questionCount: quizResponse.question_count,
          questions: quizResponse.questions || [],
        };
        upsertHistoryItem(currentDoc);
        btnQuiz.disabled = false;
        btnQuiz.textContent = 'Start quiz →';
        showToast('Quiz ready — ' + QUIZ_DATA.length + ' questions generated on Mac 2');
      },
      onError: (msg) => {
        btnQuiz.disabled = false;
        btnQuiz.textContent = 'Quiz failed — retry';
        btnQuiz.onclick = () => retryQuiz(docMeta.title, summaryResponse);
        showToast(msg || 'Quiz generation failed on Mac 2');
      },
    });

  } catch (error) {
    document.getElementById('btn-process').disabled = false;
    showToast(error.message || 'Unable to process document');
    resetUpload(false);
  }
}

async function retryQuiz(title, summaryResponse) {
  const btnQuiz = document.getElementById('btn-quiz');
  btnQuiz.disabled = true;
  btnQuiz.textContent = 'Retrying…';
  try {
    const quizResponse = await LEARNOVA_API.generateQuiz({
      title,
      summary: summaryResponse,
      question_count: APP_CONFIG.api?.questionCount || 6,
    });
    QUIZ_DATA = (quizResponse.questions || []).map(LEARNOVA_API.formatQuestionForUI);
    currentDoc.quizData = QUIZ_DATA;
    currentDoc.initialQuiz = {
      title: quizResponse.title,
      questionCount: quizResponse.question_count,
      questions: quizResponse.questions || [],
    };
    upsertHistoryItem(currentDoc);
    btnQuiz.disabled = false;
    btnQuiz.textContent = 'Start quiz →';
    btnQuiz.onclick = () => startQuiz();
    showToast('Quiz ready');
  } catch (err) {
    btnQuiz.disabled = false;
    btnQuiz.textContent = 'Quiz failed — retry';
    showToast(err.message || 'Quiz generation failed');
  }
}

function showProcessingState() {
  const html = `
    <div class="loading-state">
      <div class="loading-shell">
        <div class="loading-label">Processing document</div>
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loading-text">Reading your document…</div>
        <div class="loading-bar"><div class="loading-bar-fill" id="loading-bar-fill"></div></div>
        <div class="loading-pct" id="loading-pct">0%</div>
        <div class="loading-steps" id="loading-steps">
          <div class="loading-step active"><span class="loading-step-dot"></span><span>Reading pages and extracting content</span></div>
          <div class="loading-step"><span class="loading-step-dot"></span><span>Identifying key concepts and themes</span></div>
          <div class="loading-step"><span class="loading-step-dot"></span><span>Building your summary and quiz set</span></div>
          <div class="loading-step"><span class="loading-step-dot"></span><span>Finalising learning state</span></div>
        </div>
      </div>
    </div>`;
  if (window.LN) window.LN.swapPanelContent(document.getElementById('right-panel'), html, 'forward');
  else document.getElementById('right-panel').innerHTML = html;
}

function updateProcessingState(progress, activeIndex) {
  const labels = [
    'Reading your document…',
    'Finding the most relevant ideas…',
    'Writing your summary and quiz…',
    'Almost ready…'
  ];
  const bar = document.getElementById('loading-bar-fill');
  const pct = document.getElementById('loading-pct');
  const text = document.getElementById('loading-text');
  if (bar) bar.style.width = progress + '%';
  if (pct) pct.textContent = progress + '%';
  if (text) text.textContent = labels[Math.min(activeIndex, labels.length - 1)];
  document.querySelectorAll('#loading-steps .loading-step').forEach((node, idx) => {
    node.classList.toggle('done', idx < activeIndex);
    node.classList.toggle('active', idx === activeIndex);
  });
}

function showSummary() {
  if (!currentDoc) return;
  setSummaryMode(true);
  renderDocumentInfo();
  const summaryHTML = `<div class="summary-panel">${renderSummaryMarkup(currentDoc, { ctaLabel: 'Take quiz →', ctaHandler: 'startQuiz()', ctaHint: `${QUIZ_DATA.length} questions ready` })}</div>`;
  if (window.LN) window.LN.swapPanelContent(document.getElementById('right-panel'), summaryHTML, 'backward');
  else document.getElementById('right-panel').innerHTML = summaryHTML;
  syncCompactFile();
}

function startQuiz() {
  quizMode = true; currentQ = 0; answers = []; answered = false;
  document.getElementById('btn-quiz').style.display = 'none';
  setUploadCollapsed(true);
  renderQuestion('forward');
}

function renderQuestion(direction='forward') {
  answered = false;
  const q = QUIZ_DATA[currentQ];
  const pct = Math.round((currentQ/QUIZ_DATA.length)*100);
  const html = `
    <div class="quiz-container">
      <div class="quiz-q-header">
        <span class="quiz-q-num">Question ${currentQ+1} of ${QUIZ_DATA.length}</span>
        <span style="font-size:11px;color:var(--cream-25)">${QUIZ_DATA.length - currentQ - 1} remaining</span>
      </div>
      <div class="quiz-q-prog"><div class="quiz-q-prog-fill" style="width:${pct}%"></div></div>
      <div class="quiz-question">${q.q}</div>
      <div class="quiz-options">
        ${q.opts.map((o,i) => `<button class="quiz-opt" onclick="selectAnswer(${i})" id="opt-${i}"><span class="opt-letter">${'ABCD'[i]}</span>${o}</button>`).join('')}
      </div>
      <div class="quiz-feedback-inline" id="qfeedback"></div>
      <div class="quiz-nav">
        <button class="btn" onclick="skipQuestion()" id="btn-skip" style="font-size:12px">Skip</button>
        <button class="btn btn-primary" id="btn-next" style="display:none" onclick="nextQuestion()">
          ${currentQ+1 < QUIZ_DATA.length ? 'Next question →' : 'See results →'}
        </button>
      </div>
    </div>`;
  if (window.LN) window.LN.swapPanelContent(document.getElementById('right-panel'), html, direction);
  else document.getElementById('right-panel').innerHTML = html;
}

function selectAnswer(i) {
  if (answered) return;
  answered = true;
  const q = QUIZ_DATA[currentQ];
  answers.push({ chosen: i, correct: q.correct });
  const fb = document.getElementById('qfeedback');
  document.querySelectorAll('.quiz-opt').forEach((el,j) => {
    if (j === q.correct) el.classList.add('correct');
    else if (j === i && i !== q.correct) el.classList.add('wrong');
    el.style.pointerEvents = 'none';
  });
  if (i === q.correct) { fb.className='quiz-feedback-inline correct'; fb.textContent='Correct — '+q.explanation; }
  else { fb.className='quiz-feedback-inline wrong'; fb.textContent='Incorrect. '+q.explanation; }
  document.getElementById('btn-skip').style.display = 'none';
  document.getElementById('btn-next').style.display = 'inline-flex';
}
function skipQuestion() { answers.push({ chosen:-1, correct:QUIZ_DATA[currentQ].correct }); nextQuestion(); }
function nextQuestion() {
  currentQ++;
  if (currentQ >= QUIZ_DATA.length) { showQuizResults(); return; }
  renderQuestion('forward');
}

async function showQuizResults() {
  const score = answers.filter(a => a.chosen === a.correct).length;
  const pct = Math.round((score/QUIZ_DATA.length)*100);
  try {
    const analysis = await LEARNOVA_API.analyzeQuizResults({
      title: currentDoc.title,
      summary: currentDoc.summaryRaw,
      questions: currentDoc.initialQuiz.questions,
      answers: answers.map((answer, index) => ({
        question_index: index,
        chosen_index: answer.chosen
      }))
    });
    currentDoc = LEARNOVA_API.applyAnalysisToRecord(currentDoc, analysis);
  } catch (error) {
    showToast(error.message || 'Could not analyze quiz results');
    return;
  }
  upsertHistoryItem(currentDoc);
  const circ = 251.2; const offset = circ - (pct/100)*circ;
  const html = `
    <div class="quiz-results">
    <div style="text-align:center;margin-bottom:24px" class="result-step">
      <svg width="100" height="100" viewBox="0 0 110 110">
        <circle cx="55" cy="55" r="40" fill="none" stroke="var(--border)" stroke-width="7"/>
        <circle cx="55" cy="55" r="40" fill="none" stroke="var(--gold)" stroke-width="7" stroke-linecap="round"
          stroke-dasharray="${circ}" stroke-dashoffset="${offset}" transform="rotate(-90 55 55)" style="transition:stroke-dashoffset 1s ease"/>
        <text x="55" y="55" text-anchor="middle" dominant-baseline="central" font-family="DM Serif Display,serif" font-size="22" fill="currentColor">${pct}%</text>
      </svg>
      <div style="font-size:12px;color:var(--cream-25);margin-top:4px">${score} of ${QUIZ_DATA.length} correct</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:20px" class="result-step">
      ${QUIZ_DATA.map((q,i) => {
        const a = answers[i]; const isCorrect = a && a.chosen === a.correct;
        return `<div style="padding:10px 14px;border-radius:var(--radius-md);border:0.5px solid ${isCorrect?'rgba(107,158,107,0.22)':'rgba(200,120,80,0.18)'};background:${isCorrect?'rgba(107,158,107,0.04)':'rgba(200,120,80,0.03)'};font-size:12px">
          <span style="color:${isCorrect?'var(--green)':'var(--red-soft)'};margin-right:8px">${isCorrect?'✓':'✗'}</span>
          <span style="color:var(--cream-60)">${q.q.substring(0,60)}…</span>
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:8px;padding-top:16px;border-top:0.5px solid var(--border)" class="result-step">
      <button class="btn" onclick="startQuiz()">Retake quiz</button>
      <a href="results.html" class="btn btn-primary">Full results →</a>
    </div>
    </div>`;
  if (window.LN) {
    window.LN.swapPanelContent(document.getElementById('right-panel'), html, 'forward');
    setTimeout(() => {
      const panel = document.getElementById('right-panel');
      window.LN.revealSequence(panel.querySelectorAll('.result-step'), 110);
      const ring = panel.querySelector('circle[stroke="var(--gold)"]');
      if (ring) window.LN.animateScoreRing(ring, pct);
    }, 220);
  } else {
    document.getElementById('right-panel').innerHTML = html;
  }
  showToast('Quiz complete — ' + pct + '% score saved');
}

function resetUpload() {
  if (processingTimer) {
    clearInterval(processingTimer);
    processingTimer = null;
  }
  uploadedFiles = []; document.getElementById('file-list').innerHTML = '';
  document.getElementById('file-input').value = ''; document.getElementById('paste-area').value = '';
  document.getElementById('breadcrumb-cur').textContent = 'New document';
  document.getElementById('btn-rescan').style.display = 'none'; document.getElementById('btn-quiz').style.display = 'none';
  document.getElementById('btn-process').style.display = 'none'; document.getElementById('btn-process').disabled = false;
  quizMode = false;
  resumedSession = false;
  sourceText = '';
  const latest = getLatestResult() || baseDoc;
  currentDoc = latest ? { ...latest, done: false, score: null, correct: null } : null;
  QUIZ_DATA = currentDoc && Array.isArray(currentDoc.quizData) ? currentDoc.quizData.map(entry => ({ ...entry })) : [];
  setSummaryMode(false);
  setUploadCollapsed(false);
  document.getElementById('right-panel').innerHTML = `<div class="empty-state"><svg class="empty-icon" width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.1"><path d="M10 6h14l8 8v22H10V6z"/><path d="M24 6v8h8"/><path d="M14 18h12M14 24h12M14 30h8"/></svg><div class="empty-text">Your summary will appear here.</div><div class="empty-sub">Upload a document or paste text to begin.</div></div>`;
}

function loadResumedQuizFlow() {
  const params = new URLSearchParams(window.location.search);
  const resumeId = parseInt(params.get('resume'), 10);
  const mode = params.get('mode') || 'summary';
  if (!resumeId) return;
  const item = getHistoryItem(resumeId);
  if (!item) return;
  resumedSession = true;
  currentDoc = { ...item, done: false, score: null, correct: null };
  sourceText = item.sourceText || '';
  setActiveResult(item.id);
  QUIZ_DATA = Array.isArray(item.quizData) ? item.quizData.map(entry => ({ ...entry })) : [];
  currentDoc.infoRows = [
    ['File type', currentDoc.fileType || 'PDF'],
    ['File size', currentDoc.pageCount ? `${currentDoc.pageCount} pages` : 'Ready'],
    ['Pages', String(currentDoc.pageCount || 1)],
    ['Language', 'English'],
    ['Processed at', getProcessedTime()],
  ];
  document.getElementById('breadcrumb-cur').textContent = currentDoc.title;
  document.getElementById('btn-rescan').style.display = 'flex';
  document.getElementById('btn-process').style.display = 'none';
  document.getElementById('btn-quiz').style.display = mode === 'quiz' ? 'none' : 'flex';
  document.getElementById('btn-process').disabled = false;
  showSummary();
  if (mode === 'quiz') startQuiz();
}

document.addEventListener('DOMContentLoaded', () => {
  updateUploadUI();
  syncCompactFile();
  loadResumedQuizFlow();
});

async function resolveSourceText() {
  if (hasPastedText()) return document.getElementById('paste-area').value.trim();
  if (!uploadedFiles.length) throw new Error('LEARNOVA-PDF-V2: upload a PDF/TXT file or paste document text first.');
  const file = uploadedFiles[0];
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'pdf') return readPdfAsText(file);
  if (ext !== 'txt') throw new Error('LEARNOVA-PDF-V2: only PDF and TXT files are supported in the AI flow right now.');
  return readFileAsText(file);
}

function readFileAsText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ''));
    reader.onerror = () => reject(new Error('Unable to read the selected file.'));
    reader.readAsText(file);
  });
}

async function readPdfAsText(file) {
  if (!window.pdfjsLib) {
    throw new Error('LEARNOVA-PDF-V2: PDF reader failed to load. Refresh the page and try again.');
  }
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const pageTexts = [];
  for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1) {
    const page = await pdf.getPage(pageNumber);
    const content = await page.getTextContent();
    const pageText = content.items
      .map(item => ('str' in item ? item.str : ''))
      .join(' ')
      .replace(/\s+/g, ' ')
      .trim();
    if (pageText) pageTexts.push(pageText);
  }
  if (!pageTexts.length) {
    throw new Error('LEARNOVA-PDF-V2: no readable text was found in this PDF.');
  }
  return pageTexts.join('\n\n');
}
