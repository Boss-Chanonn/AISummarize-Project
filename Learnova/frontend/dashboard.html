<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Learnova — Dashboard</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount"></div>
  <main class="main-content">
    <div class="page-header fade-up">
      <div>
        <div class="page-title" id="greeting">Welcome back.</div>
        <div class="page-subtitle" id="today-date"></div>
      </div>
    </div>

    <div class="stats-grid fade-up fade-up-1 reveal reveal-delay-1">
      <div class="stat-card card-lift">
        <div class="stat-label">Documents uploaded</div>
        <div class="stat-value delay-1" id="stat-docs" data-target="0">—</div>
        <div class="stat-sub" id="stat-docs-sub">&nbsp;</div>
      </div>
      <div class="stat-card card-lift">
        <div class="stat-label">Average quiz score</div>
        <div class="stat-value delay-2" id="stat-score" data-target="0" data-suffix="%">—</div>
        <div class="stat-sub" id="stat-score-sub">&nbsp;</div>
      </div>
      <div class="stat-card card-lift">
        <div class="stat-label">Quizzes completed</div>
        <div class="stat-value delay-3" id="stat-quizzes" data-target="0">—</div>
        <div class="stat-sub" id="stat-quizzes-sub">&nbsp;</div>
      </div>
    </div>

    <div class="fade-up fade-up-2 reveal reveal-delay-2 dash-section" style="margin-bottom:32px">
      <div class="section-label">Quick actions</div>
      <div class="quick-actions">
        <a href="upload.html" class="qa-card card-lift">
          <div class="qa-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M10 14V6M6 10l4-4 4 4"/><rect x="2" y="2" width="16" height="16" rx="3"/></svg></div>
          <div class="qa-title">Upload &amp; summarise</div>
          <div class="qa-desc">Drop a PDF or paste text to get an instant AI summary.</div>
          <div class="qa-arrow">→</div>
        </a>
        <a href="module.html" class="qa-card card-lift">
          <div class="qa-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M3 16V7l7-4 7 4v9"/><path d="M10 3v13"/><path d="M6 12h8"/></svg></div>
          <div class="qa-title">Continue learning</div>
          <div class="qa-desc">You have 3 recommended resources waiting in your module.</div>
          <div class="qa-arrow">→</div>
        </a>
      </div>
    </div>

    <div class="fade-up fade-up-3 reveal reveal-delay-3 dash-section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="section-label" style="margin:0">Recent activity</div>
        <a href="history.html" style="font-size:11px;color:var(--cream-25)">View all →</a>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px" id="recent-activity-list"></div>
    </div>
  </main>
</div>
<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>
<script src="js/animations.js"></script>
<script src="js/session-expiry.js"></script>
<script src="js/app.js"></script>
<script>
// Auth guard — redirect to login if no token.
(function() {
  const token = localStorage.getItem('token');
  if (!token) { window.location.replace('index.html'); }
})();

document.getElementById('sidebar-mount').innerHTML = renderSidebar('dashboard');

const now = new Date();
const currentHour = now.getHours();
document.getElementById('today-date').textContent = now.toLocaleDateString('en-NZ',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

/**
 * Resolve greeting prefix from local hour.
 * @param {number} hour
 * @returns {string}
 */
function getGreetingPrefix(hour) {
  if (hour < 12) return 'Good morning';
  if (hour < 17) return 'Good afternoon';
  return 'Good evening';
}

/**
 * Load profile data and render dashboard greeting/stats.
 * @returns {Promise<void>}
 */
async function loadDashboard() {
  try {
    // Phase 1: Fetch user profile stats.
    const response = await fetch('/api/user/profile', {
      method: 'GET',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + localStorage.getItem('token')
      }
    });
    const data = await response.json();
    if (!response.ok) { showToast(data.message || 'Failed to load profile'); return; }

    // Phase 2: Render greeting text.
    const firstName = data.name ? data.name.split(' ')[0] : 'User';
    document.getElementById('greeting').textContent = getGreetingPrefix(currentHour) + ', ' + firstName + '.';

    // Phase 3: Render headline stats (animated when animation helpers are available).
    if (data.documentsUploaded !== undefined) {
      const docsEl = document.getElementById('stat-docs');
      const scoreEl = document.getElementById('stat-score');
      const quizzesEl = document.getElementById('stat-quizzes');
      docsEl.dataset.target = data.documentsUploaded;
      scoreEl.dataset.target = data.averageScore;
      quizzesEl.dataset.target = data.quizzesCompleted;
      if (window.LN && window.LN.countUp) {
        window.LN.countUp(docsEl, data.documentsUploaded, 900, '');
        window.LN.countUp(scoreEl, data.averageScore, 900, '%');
        window.LN.countUp(quizzesEl, data.quizzesCompleted, 900, '');
      } else {
        docsEl.textContent = data.documentsUploaded;
        scoreEl.textContent = data.averageScore + '%';
        quizzesEl.textContent = data.quizzesCompleted;
      }
    }

    // Phase 4: Render stat subtitles.
    if (data.statSubs) {
      document.getElementById('stat-docs-sub').textContent = data.statSubs[0];
      document.getElementById('stat-score-sub').textContent = data.statSubs[1];
      document.getElementById('stat-quizzes-sub').textContent = data.statSubs[2];
    }
  } catch (error) {
    console.error('Error:', error);
    showToast('Unable to load dashboard');
  }
}

loadDashboard();

/**
 * Format document metadata for recent activity rows.
 * @param {object} doc
 * @returns {string}
 */
function formatDocumentMeta(doc) {
  const d = doc.uploadedAt ? new Date(doc.uploadedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '';
  return (doc.fileType || 'Text') + (d ? ' · ' + d : '');
}

function flatAnalysis(item) {
  const a = item.analysis || {};
  return {
    strengths: a.strengths || [],
    weaknesses: a.weaknesses || [],
    studyNext: a.studyNext || [],
    recommendations: a.recommendations || []
  };
}

function renderRecentPreview(item) {
  const hid = item._id;
  const an = flatAnalysis(item);
  if (!item.done) {
    return `
    <div class="mini-result" style="padding:14px 18px">
      <div style="font-size:12px;color:var(--cream-25);margin-bottom:10px">${escapeHtml((item.summary && item.summary.body) ? (Array.isArray(item.summary.body) ? item.summary.body[0] : item.summary.body).slice(0,200)+'\u2026' : 'No summary yet')}</div>
      <div class="mr-actions" onclick="event.stopPropagation()">
        <button class="btn" onclick="event.stopPropagation();openSummaryModal('${hid}')">Summary</button>
        <a href="upload.html?resume=${hid}&mode=quiz" class="btn">Take quiz &rarr;</a>
        <a href="module.html?historyId=${hid}" class="btn btn-gold">Learning module &rarr;</a>
        <button class="btn" onclick="event.stopPropagation();confirmDelete('${hid}')">Delete</button>
      </div>
    </div>`;
  }
  return `
    <div class="mini-result">
      <div class="mr-top">
        <div>
          <div class="mr-score">${item.score}%</div>
          <div class="mr-correct">${item.correct} of ${item.total} correct</div>
        </div>
        <div style="flex:1">
          <div class="mr-section">Strengths</div>
          <div class="mr-tags">${an.strengths.map(s=>`<span class="badge badge-green">${escapeHtml(s)}</span>`).join('')}</div>
          <div class="mr-section">Needs work</div>
          <div class="mr-tags">${an.weaknesses.map(s=>`<span class="badge badge-red">${escapeHtml(s)}</span>`).join('')}</div>
          <div class="mr-section">Study next</div>
          <div class="mr-tags">${an.studyNext.map(s=>`<span class="badge badge-gold">${escapeHtml(s)}</span>`).join('')}</div>
        </div>
      </div>
      <div class="mr-actions" onclick="event.stopPropagation()">
        <button class="btn" onclick="event.stopPropagation();openSummaryModal('${hid}')">Summary</button>
        <a href="results.html?id=${hid}" class="btn">Full results</a>
        <a href="module.html?historyId=${hid}" class="btn btn-gold">Learning module &rarr;</a>
        <button class="btn" onclick="event.stopPropagation();confirmDelete('${hid}')">Delete</button>
      </div>
    </div>`;
}

/**
 * Build one recent-activity row card.
 * @param {object} item
 * @returns {string}
 */
function renderRecentActivityItem(item) {
  return `
      <div class="history-item history-item-anim" id="recent-${item._id}" onclick="toggleRecentActivity('${item._id}')">
        <div class="hi-row">
          <div class="hi-left">
            <div class="hi-dot${item.done?' done':''}"></div>
            <div style="min-width:0;flex:1">
              <div class="hi-title">${escapeHtml(item.title)}</div>
              <div class="hi-meta">${escapeHtml(formatDocumentMeta(item))}</div>
            </div>
          </div>
          <div class="hi-right">
            <div class="hi-score${!item.done?' na':''}">${item.done ? item.score+'%' : 'No quiz yet'}</div>
            <span class="hi-chevron">▾</span>
          </div>
        </div>
        ${renderRecentPreview(item)}
      </div>
    `;
}

let _dashStore = {};

async function renderRecentActivity() {
  try {
    const response = await fetch('/api/history/recent', {
      method: 'GET',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + localStorage.getItem('token')
      }
    });
    const items = await response.json();
    if (!response.ok) { showToast('Failed to load recent activity'); return; }
    _dashStore = {};
    items.forEach(it => { _dashStore[it._id] = it; });
    if (!items.length) {
      document.getElementById('recent-activity-list').innerHTML = '<div style="text-align:center;padding:24px;font-size:13px;color:var(--cream-25);font-style:italic">No activity yet. Upload a document to get started.</div>';
      return;
    }

    // Render each row via named helper so structure is easier to follow.
    document.getElementById('recent-activity-list').innerHTML = items.map(renderRecentActivityItem).join('');
  } catch (error) {
    console.error('Error:', error);
    showToast('Unable to load recent activity');
  }
}

function toggleRecentActivity(id) {
  const el = document.getElementById('recent-' + id);
  const wasOpen = el.classList.contains('open');
  document.querySelectorAll('#recent-activity-list .history-item').forEach(node => node.classList.remove('open'));
  if (!wasOpen) el.classList.add('open');
}

renderRecentActivity();

function openSummaryModal(id) {
  const h = _dashStore[id] || {};
  const summary = h.summary || {};
  const body = summary.body
    ? (Array.isArray(summary.body) ? summary.body : [summary.body])
    : [];
  const takeaways = summary.takeaways
    ? (Array.isArray(summary.takeaways) ? summary.takeaways : [summary.takeaways])
    : [];
  document.getElementById('sum-modal-title').textContent = h.title || 'Summary';
  document.getElementById('sum-modal-body-content').innerHTML =
    '<div class="sum-modal-badge">AI Summary</div>' +
    body.map(p => `<p class="sum-modal-para">${escapeHtml(p)}</p>`).join('') +
    (takeaways.length ? `
      <div>
        <div class="sum-modal-kp-label">Key takeaways</div>
        <div class="sum-modal-kp">
          ${takeaways.map(t => `<div class="sum-modal-kp-item"><span class="sum-modal-kp-dash">\u2014</span><span>${escapeHtml(t)}</span></div>`).join('')}
        </div>
      </div>` : '') +
    ((!body.length && !takeaways.length) ? '<p class="sum-modal-para" style="color:var(--cream-25);font-style:italic">No summary available for this document.</p>' : '');
  document.getElementById('sum-modal-backdrop').classList.add('open');
}

function closeSummaryModal() {
  document.getElementById('sum-modal-backdrop').classList.remove('open');
}

async function confirmDelete(id) {
  if (!confirm('Delete this history item? This cannot be undone.')) return;
  try {
    const res = await fetch('/api/history/' + id, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
    });
    if (res.ok) { showToast('Deleted'); renderRecentActivity(); }
    else { const d = await res.json(); showToast(d.message || 'Delete failed'); }
  } catch(e) { showToast('Delete failed'); }
}
</script>

<!-- Summary modal -->
<div class="sum-modal-backdrop" id="sum-modal-backdrop" onclick="if(event.target===this)closeSummaryModal()">
  <div class="sum-modal">
    <div class="sum-modal-head">
      <div class="sum-modal-title" id="sum-modal-title"></div>
      <button class="sum-modal-close" onclick="closeSummaryModal()">&#x2715;</button>
    </div>
    <div class="sum-modal-body" id="sum-modal-body-content"></div>
  </div>
</div>

</body>
</html>
