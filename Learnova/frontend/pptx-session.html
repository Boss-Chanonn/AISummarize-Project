<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Learnova — PPTX Sessions</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    /* ── Upload zone ── */
    .pptx-upload-zone{
      border:0.5px dashed rgba(200,184,154,0.3);border-radius:var(--radius-lg);
      padding:52px 32px;text-align:center;
      background:linear-gradient(180deg,rgba(200,184,154,0.04),rgba(200,184,154,0.01));
      cursor:pointer;transition:border-color 0.15s,background 0.15s;
      position:relative;
    }
    .pptx-upload-zone:hover,.pptx-upload-zone.drag{
      border-color:rgba(200,184,154,0.5);
      background:linear-gradient(180deg,rgba(200,184,154,0.07),rgba(200,184,154,0.02));
    }
    .pptx-upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .pup-icon{width:44px;height:44px;border-radius:10px;background:rgba(200,184,154,0.1);border:0.5px solid rgba(200,184,154,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
    .pup-title{font-family:var(--serif);font-size:20px;letter-spacing:-0.3px;margin-bottom:6px}
    .pup-sub{font-size:12px;color:var(--cream-25);line-height:1.65}
    .pup-badge{display:inline-flex;align-items:center;gap:5px;margin-top:14px;padding:5px 12px;border-radius:999px;border:0.5px solid rgba(200,184,154,0.25);background:rgba(200,184,154,0.06);font-size:11px;color:var(--gold)}

    /* ── Processing state ── */
    .proc-state{border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:36px 32px;text-align:center}
    .proc-spinner{width:28px;height:28px;border:1.5px solid var(--border-md);border-top-color:var(--gold);border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 18px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .proc-title{font-family:var(--serif);font-size:22px;margin-bottom:8px;letter-spacing:-0.3px}
    .proc-sub{font-size:12px;color:var(--cream-25);line-height:1.7;max-width:44ch;margin:0 auto}
    .proc-progress{margin-top:20px}
    .proc-prog-track{height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin-top:8px}
    .proc-prog-fill{height:100%;background:var(--gold);border-radius:1px;transition:width 0.6s ease;width:0%}

    /* ── Document header ── */
    .doc-header{
      display:grid;grid-template-columns:minmax(0,1fr) auto;gap:20px;align-items:start;
      border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:28px 30px;
      background:radial-gradient(110% 110% at 0% 0%,rgba(200,184,154,0.08),transparent 44%),
                 linear-gradient(180deg,rgba(240,237,232,0.04),rgba(240,237,232,0.02));
      margin-bottom:24px;
    }
    .dh-kicker{font-size:10px;letter-spacing:1.3px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:7px}
    .dh-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
    .dh-title{font-family:var(--serif);font-size:30px;letter-spacing:-0.7px;line-height:1.08;margin-bottom:10px}
    .dh-meta{display:flex;gap:14px;flex-wrap:wrap}
    .dh-meta-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--cream-25);padding:6px 10px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--cream-05)}
    .dh-meta-item svg{width:12px;height:12px;opacity:0.4}
    .dh-actions{display:flex;flex-direction:column;gap:8px;align-items:flex-end}

    /* ── Slide picker ── */
    .slide-picker-wrap{border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:24px}
    .sp-head{padding:20px 24px;border-bottom:0.5px solid var(--border);background:rgba(200,184,154,0.03);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .sp-head-left{}
    .sp-title{font-size:13px;font-weight:500;color:var(--cream-60);margin-bottom:3px}
    .sp-sub{font-size:11px;color:var(--cream-25)}
    .sp-body{padding:24px}
    .sp-label{font-size:10px;letter-spacing:1.1px;text-transform:uppercase;color:var(--cream-25);margin-bottom:12px}
    .slide-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}
    .slide-pill{
      width:38px;height:38px;border-radius:var(--radius-sm);
      display:flex;align-items:center;justify-content:center;
      font-size:12px;cursor:pointer;
      border:0.5px solid var(--border);color:var(--cream-40);
      background:var(--cream-05);transition:all 0.13s;user-select:none;
      position:relative;
    }
    .slide-pill:hover{border-color:rgba(200,184,154,0.3);color:var(--cream-60)}
    .slide-pill.in-range{background:rgba(200,184,154,0.1);border-color:rgba(200,184,154,0.3);color:var(--gold)}
    .slide-pill.done{background:rgba(107,158,107,0.1);border-color:rgba(107,158,107,0.25);color:var(--green);cursor:default;font-size:0}
    .slide-pill.done::after{content:'✓';font-size:12px}
    .slide-pill.anchor{border-color:var(--gold);background:rgba(200,184,154,0.16)}
    .sp-range-info{display:flex;align-items:center;gap:12px;padding:13px 16px;background:rgba(200,184,154,0.04);border:0.5px solid rgba(200,184,154,0.15);border-radius:var(--radius-md);margin-bottom:16px;flex-wrap:wrap}
    .sri-label{font-size:12px;color:var(--cream-40);flex:1}
    .sri-value{font-size:14px;color:var(--gold);font-family:var(--serif)}
    .sp-hint{font-size:11px;color:var(--cream-25);line-height:1.65;padding:10px 14px;background:var(--cream-05);border:0.5px solid var(--border);border-radius:var(--radius-sm)}

    /* ── Session list ── */
    .sessions-wrap{border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:24px}
    .sw-head{padding:18px 22px;border-bottom:0.5px solid var(--border);background:rgba(240,237,232,0.025);display:flex;align-items:center;justify-content:space-between}
    .sw-title{font-size:13px;font-weight:500;color:var(--cream-60)}
    .sw-count{font-size:11px;color:var(--cream-25)}
    .session-list{display:flex;flex-direction:column}
    .session-row{display:flex;align-items:center;gap:14px;padding:14px 22px;border-bottom:0.5px solid var(--border);transition:background 0.12s}
    .session-row:last-child{border-bottom:none}
    .session-row:hover{background:rgba(240,237,232,0.02)}
    .sess-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
    .sess-dot.pending{background:rgba(200,184,154,0.35)}
    .sess-dot.active{background:var(--gold);animation:pulse 1.5s ease-in-out infinite}
    .sess-info{flex:1}
    .sess-label{font-size:13px;color:var(--cream-60);margin-bottom:2px}
    .sess-meta{font-size:11px;color:var(--cream-25)}
    .sess-score{font-family:var(--serif);font-size:18px;color:var(--gold)}
    .sess-score.pending{font-size:12px;font-family:var(--sans);color:var(--cream-25)}
    .sess-actions{display:flex;gap:7px}

    /* ── Module unlock banner ── */
    .module-unlock-banner{
      border:0.5px solid rgba(107,158,107,0.3);border-radius:var(--radius-lg);
      padding:22px 26px;background:rgba(107,158,107,0.06);
      display:flex;align-items:center;gap:16px;margin-bottom:24px;
    }
    .mub-icon{width:36px;height:36px;border-radius:8px;background:rgba(107,158,107,0.12);border:0.5px solid rgba(107,158,107,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .mub-title{font-size:14px;font-weight:500;color:var(--green);margin-bottom:3px}
    .mub-copy{font-size:12px;color:var(--cream-40);line-height:1.6}
    .module-locked-banner{
      border:0.5px solid var(--border);border-radius:var(--radius-lg);
      padding:22px 26px;background:var(--cream-05);
      display:flex;align-items:center;gap:16px;margin-bottom:24px;opacity:0.7;
    }

    /* ── Quiz area ── */
    .quiz-area{border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:26px;background:linear-gradient(180deg,rgba(240,237,232,0.04),rgba(240,237,232,0.02))}
    .qa-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
    .qa-kicker{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--cream-25);margin-bottom:6px}
    .qa-title{font-family:var(--serif);font-size:22px;letter-spacing:-0.4px;line-height:1.2}
    .quiz-pending{display:flex;flex-direction:column;align-items:center;gap:12px;padding:30px}
    .quiz-spinner{width:20px;height:20px;border:1.5px solid var(--border-md);border-top-color:var(--gold);border-radius:50%;animation:spin 0.9s linear infinite}
    .qp-text{font-size:13px;color:var(--cream-40);font-style:italic}
    .quiz-questions{display:flex;flex-direction:column;gap:20px}
    .qq-item{padding:18px;border:0.5px solid var(--border);border-radius:var(--radius-md);background:var(--cream-05)}
    .qq-num{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--cream-25);margin-bottom:8px}
    .qq-text{font-family:var(--serif);font-size:18px;line-height:1.35;margin-bottom:14px}
    .qq-opts{display:flex;flex-direction:column;gap:7px}
    .qq-opt{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:rgba(240,237,232,0.02);cursor:pointer;text-align:left;font-family:var(--sans);font-size:13px;color:var(--cream-60);width:100%;transition:border-color 0.12s}
    .qq-opt:hover{border-color:var(--gold)}
    .qq-opt.selected{border-color:var(--gold);background:rgba(200,184,154,0.08);color:var(--cream)}
    .qq-opt.correct{border-color:rgba(107,158,107,0.35);background:rgba(107,158,107,0.08)}
    .qq-opt.wrong{border-color:rgba(200,120,80,0.3);background:rgba(200,120,80,0.06)}
    .qq-mark{width:22px;height:22px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
    .qq-opt.selected .qq-mark{background:var(--gold);color:var(--bg)}
    .qq-opt.correct .qq-mark{background:var(--green);color:#fff}
    .qq-opt.wrong .qq-mark{background:rgba(200,120,80,0.7);color:#fff}
    .qq-feedback{display:none;margin-top:10px;padding:10px 13px;border-radius:var(--radius-sm);font-size:12px;line-height:1.65}
    .qq-feedback.show{display:block}
    .qq-feedback.correct{background:rgba(107,158,107,0.07);border:0.5px solid rgba(107,158,107,0.2);color:var(--green)}
    .qq-feedback.wrong{background:rgba(200,120,80,0.05);border:0.5px solid rgba(200,120,80,0.2);color:rgba(200,120,80,0.9)}
    .quiz-results{padding:20px;text-align:center}
    .qr-score{font-family:var(--serif);font-size:60px;color:var(--gold);line-height:1;margin-bottom:6px}
    .qr-label{font-size:13px;color:var(--cream-40);margin-bottom:20px}
    .qr-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

    /* ── Pro lock overlay ── */
    .pro-lock-wrap{text-align:center;padding:52px 32px;border:0.5px solid rgba(200,184,154,0.18);border-radius:var(--radius-lg);background:linear-gradient(180deg,rgba(200,184,154,0.04),rgba(200,184,154,0.01))}
    .pro-lock-icon{width:48px;height:48px;border-radius:12px;background:rgba(200,184,154,0.1);border:0.5px solid rgba(200,184,154,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
    .pro-lock-title{font-family:var(--serif);font-size:26px;letter-spacing:-0.5px;margin-bottom:8px}
    .pro-lock-copy{font-size:13px;color:var(--cream-40);line-height:1.75;max-width:46ch;margin:0 auto 22px}

    /* ── Prev documents ── */
    .prev-docs{display:flex;flex-direction:column;gap:10px}
    .prev-doc-card{display:flex;align-items:center;gap:14px;padding:14px 18px;border:0.5px solid var(--border);border-radius:var(--radius-md);background:var(--cream-05);cursor:pointer;transition:border-color 0.13s}
    .prev-doc-card:hover{border-color:rgba(200,184,154,0.3)}
    .pdc-icon{width:32px;height:32px;border-radius:7px;background:rgba(150,120,200,0.1);border:0.5px solid rgba(150,120,200,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .pdc-info{flex:1}
    .pdc-title{font-size:13px;color:var(--cream-60);margin-bottom:2px}
    .pdc-meta{font-size:11px;color:var(--cream-25)}
    .pdc-badge{font-size:10px;padding:3px 8px;border-radius:3px}

    @media(max-width:760px){.doc-header{grid-template-columns:1fr}.dh-actions{flex-direction:row;align-items:flex-start}}
  </style>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount"></div>
  <main class="main-content">

    <div style="font-size:12px;color:var(--cream-25);margin-bottom:20px;display:flex;gap:8px;align-items:center" class="fade-up">
      <a href="dashboard.html" style="color:var(--cream-25)">Dashboard</a>
      <span style="color:var(--border-md)">/</span>
      <span style="color:var(--cream-60)">PPTX Sessions</span>
    </div>

    <div id="page-root"></div>

  </main>
</div>
<button class="sidebar-hamburger" onclick="toggleSidebar(event)" aria-label="Toggle sidebar">☰</button>
<div class="sidebar-backdrop" onclick="toggleSidebar(event)"></div>

<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/api.js"></script>
<script>
// ── Auth guard ────────────────────────────────────────────────────────────────
(function() {
  const token = localStorage.getItem('token');
  if (!token) window.location.replace('index.html');
})();

document.getElementById('sidebar-mount').innerHTML = renderSidebar('pptx');

const isPro = LEARNOVA_USER?.tier === 'pro';
const API = window.LEARNOVA_API;
const root = document.getElementById('page-root');

// ── State ─────────────────────────────────────────────────────────────────────
let activeDoc = null;         // currently loaded PPTX document
let rangeStart = 1;
let rangeEnd = 5;
let selecting = false;
let anchorSlide = null;
let doneSlideSets = new Set();
let activeSession = null;     // { session_id, job_id, summaries }
let quizQuestions = [];
let quizAnswers = {};
let quizSubmitted = false;
let summaryVisible = false;   // show summary before quiz
let cancelPoll = null;
let prevDocs = [];

// ── API helpers ───────────────────────────────────────────────────────────────
const TOKEN = () => localStorage.getItem('token');
const HEADERS = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN()}` });
const BASE = (API?.API_BASE_URL || 'http://127.0.0.1:8000');

async function apiGet(path) {
  const r = await fetch(BASE + path, { headers: HEADERS() });
  if (!r.ok) { const d = await r.json().catch(() => ({})); throw new Error(d.detail || 'Request failed'); }
  return r.json();
}

async function apiPost(path, body) {
  const r = await fetch(BASE + path, { method: 'POST', headers: HEADERS(), body: JSON.stringify(body) });
  if (!r.ok) { const d = await r.json().catch(() => ({})); throw new Error(d.detail || 'Request failed'); }
  return r.json();
}

async function apiPostForm(path, formData) {
  const r = await fetch(BASE + path, { method: 'POST', headers: { 'Authorization': `Bearer ${TOKEN()}` }, body: formData });
  if (!r.ok) { const d = await r.json().catch(() => ({})); throw new Error(d.detail || 'Request failed'); }
  return r.json();
}

// ── Render: Pro lock ──────────────────────────────────────────────────────────
function renderProLock() {
  root.innerHTML = `
    <div class="pro-lock-wrap fade-up">
      <div class="pro-lock-icon">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#C8B89A" stroke-width="1.2">
          <rect x="5" y="10" width="12" height="9" rx="2"/>
          <path d="M8 10V7a3 3 0 016 0v3"/>
        </svg>
      </div>
      <div class="pro-lock-title">PPTX Sessions <em style="color:var(--gold)">— Pro only</em></div>
      <div class="pro-lock-copy">Upload PowerPoint presentations, study by slide range, and track your progress session by session. Available on the Pro plan.</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <a href="pro.html" class="btn btn-primary">Upgrade to Pro →</a>
        <a href="upload.html" class="btn">Upload a PDF instead</a>
      </div>
    </div>`;
}

// ── Render: Upload zone ───────────────────────────────────────────────────────
function renderUploadZone() {
  const hasPrev = prevDocs.length > 0;
  root.innerHTML = `
    ${hasPrev ? `
      <div class="section-label fade-up" style="margin-bottom:12px">Continue a presentation</div>
      <div class="prev-docs fade-up fade-up-1" id="prev-docs-list"></div>
      <div class="section-label fade-up fade-up-1" style="margin:24px 0 12px">Upload new presentation</div>
    ` : `
      <div class="section-label fade-up" style="margin-bottom:12px">Upload a presentation</div>
    `}
    <div class="pptx-upload-zone fade-up fade-up-1" id="upload-zone">
      <input type="file" accept=".pptx,.ppt" id="pptx-file-input" onchange="handleFileSelect(event)"/>
      <div class="pup-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#C8B89A" stroke-width="1.2">
          <rect x="2" y="3" width="16" height="13" rx="2"/>
          <path d="M7 8h4M7 11h6M7 14h3"/>
          <circle cx="14" cy="8" r="2"/>
        </svg>
      </div>
      <div class="pup-title">Drop your .pptx here</div>
      <div class="pup-sub">Or click to browse. Max 10 MB.<br>AI summarises every slide once — study any range, any time, no re-upload.</div>
      <div class="pup-badge">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="#C8B89A" stroke-width="1.1"><path d="M5 1l1.2 2.5H9L7 5.2l.8 2.6L5 6.4 2.2 7.8 3 5.2 1 3.5h2.8z"/></svg>
        Pro feature
      </div>
    </div>`;

  if (hasPrev) renderPrevDocs();
  initDragDrop();
}

function renderPrevDocs() {
  const list = document.getElementById('prev-docs-list');
  if (!list) return;
  list.innerHTML = prevDocs.map(d => `
    <div class="prev-doc-card" onclick="loadDoc('${d.id}')">
      <div class="pdc-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#B89AE8" stroke-width="1.1"><rect x="1" y="2" width="14" height="11" rx="1.5"/><path d="M5 6h4M5 9h6"/></svg>
      </div>
      <div class="pdc-info">
        <div class="pdc-title">${escapeHtml(d.title)}</div>
        <div class="pdc-meta">${d.total_slides} slides · ${d.sessions?.length || 0} sessions · ${d.status === 'ready' ? 'Ready' : 'Processing'}</div>
      </div>
      <span class="badge ${d.module_unlocked ? 'badge-green' : 'badge-gold'} pdc-badge">
        ${d.module_unlocked ? 'Module unlocked' : d.sessions?.length + ' sessions'}
      </span>
    </div>
  `).join('');
}

// ── Render: Processing ────────────────────────────────────────────────────────
function renderProcessing(title, totalSlides, progress = 5) {
  root.innerHTML = `
    <div class="proc-state fade-up">
      <div class="proc-spinner"></div>
      <div class="proc-title">Summarising <em style="color:var(--gold)">${escapeHtml(title)}</em></div>
      <div class="proc-sub">Mac 1 is reading all ${totalSlides} slides and building per-slide summaries. This takes 1–3 minutes and only happens once.</div>
      <div class="proc-progress">
        <div style="font-size:11px;color:var(--cream-25);text-align:center;margin-bottom:6px" id="proc-prog-label">Slide ${Math.round(progress / 100 * totalSlides)} of ${totalSlides}…</div>
        <div class="proc-prog-track"><div class="proc-prog-fill" id="proc-prog-fill" style="width:${progress}%"></div></div>
      </div>
    </div>`;
}

// ── Render: Active document ───────────────────────────────────────────────────
function renderActiveDoc() {
  if (!activeDoc) return;
  const sessions = activeDoc.sessions || [];
  const doneSessions = sessions.filter(s => s.done);
  const coveredSlides = countCoveredSlides(sessions);
  const allDone = coveredSlides >= activeDoc.total_slides;

  doneSlideSets = new Set();
  sessions.filter(s => s.done).forEach(s => {
    for (let i = s.slide_start; i <= s.slide_end; i++) doneSlideSets.add(i);
  });

  root.innerHTML = `
    <!-- Doc header -->
    <div class="doc-header fade-up">
      <div>
        <div class="dh-kicker"><div class="dh-dot"></div> PPTX Session</div>
        <div class="dh-title">${escapeHtml(activeDoc.title)}</div>
        <div class="dh-meta">
          <div class="dh-meta-item">
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.1"><rect x="1" y="1" width="10" height="9" rx="1.5"/><path d="M3 4h6M3 6.5h4"/></svg>
            ${activeDoc.total_slides} slides
          </div>
          <div class="dh-meta-item">
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.1"><path d="M2 9L4.5 6.5l2 2 3.5-4"/></svg>
            ${coveredSlides} of ${activeDoc.total_slides} covered
          </div>
          <div class="dh-meta-item">
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.1"><circle cx="6" cy="6" r="4.5"/><path d="M6 3.5v3l1.5 1"/></svg>
            ${sessions.length} sessions
          </div>
        </div>
      </div>
      <div class="dh-actions">
        <button class="btn" onclick="backToUpload()">← Change file</button>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="prog-wrap fade-up fade-up-1" style="margin-bottom:20px">
      <div class="prog-header">
        <div class="prog-label">Presentation coverage</div>
        <div class="prog-pct">${Math.round((coveredSlides / activeDoc.total_slides) * 100)}%</div>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${Math.round((coveredSlides / activeDoc.total_slides) * 100)}%"></div></div>
    </div>

    <!-- Module banner -->
    ${allDone ? `
      <div class="module-unlock-banner fade-up fade-up-1">
        <div class="mub-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#6B9E6B" stroke-width="1.2"><path d="M3 14V6l6-3 6 3v8"/><path d="M9 3v11"/><path d="M5.5 10h7"/></svg>
        </div>
        <div>
          <div class="mub-title">Learning module unlocked</div>
          <div class="mub-copy">You've covered all ${activeDoc.total_slides} slides. Your full learning module with resources and follow-up quiz is now available.</div>
        </div>
        <a href="module.html" class="btn btn-primary" style="white-space:nowrap;flex-shrink:0">Open module →</a>
      </div>
    ` : `
      <div class="module-locked-banner fade-up fade-up-1">
        <div class="mub-icon" style="background:var(--cream-05);border-color:var(--border)">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.4"><rect x="4" y="8" width="10" height="8" rx="1.5"/><path d="M6.5 8V6a2.5 2.5 0 015 0v2"/></svg>
        </div>
        <div>
          <div class="mub-title" style="color:var(--cream-40)">Learning module locked</div>
          <div class="mub-copy">Cover all ${activeDoc.total_slides} slides across sessions to unlock the learning module. ${activeDoc.total_slides - coveredSlides} slides remaining.</div>
        </div>
      </div>
    `}

    <!-- Slide picker -->
    <div class="section-label fade-up fade-up-2" style="margin-bottom:12px">Select slides for this session</div>
    <div class="slide-picker-wrap fade-up fade-up-2">
      <div class="sp-head">
        <div class="sp-head-left">
          <div class="sp-title">Click a slide to start your range, click another to end it</div>
          <div class="sp-sub">Green = already studied · Gold = your current selection</div>
        </div>
        <button class="btn btn-primary" id="study-btn" onclick="startSession()">Study slides ${rangeStart}–${rangeEnd} →</button>
      </div>
      <div class="sp-body">
        <div class="sp-label">Slides</div>
        <div class="slide-grid" id="slide-grid"></div>
        <div class="sp-range-info">
          <div class="sri-label">Selected range</div>
          <div class="sri-value" id="sri-value">Slides ${rangeStart} – ${rangeEnd}</div>
        </div>
        <div class="sp-hint">AI already summarised all slides at upload time — selecting a new range is instant. No re-processing needed.</div>
      </div>
    </div>

    <!-- Session list -->
    ${sessions.length ? `
      <div class="section-label fade-up fade-up-3" style="margin-bottom:12px">Your sessions</div>
      <div class="sessions-wrap fade-up fade-up-3">
        <div class="sw-head">
          <div class="sw-title">Session history</div>
          <div class="sw-count">${doneSessions.length} completed · ${sessions.length - doneSessions.length} in progress</div>
        </div>
        <div class="session-list" id="session-list"></div>
      </div>
    ` : ''}

    <!-- Quiz area -->
    <div id="quiz-area"></div>
  `;

  renderSlideGrid();
  if (sessions.length) renderSessionList();
  if (activeSession) renderQuizArea();
}

// ── Slide grid ────────────────────────────────────────────────────────────────
function renderSlideGrid() {
  const grid = document.getElementById('slide-grid');
  if (!grid) return;
  grid.innerHTML = '';
  for (let i = 1; i <= activeDoc.total_slides; i++) {
    const pill = document.createElement('div');
    pill.className = 'slide-pill';
    pill.textContent = i;
    if (doneSlideSets.has(i)) {
      pill.className = 'slide-pill done';
      pill.title = `Slide ${i} — studied`;
    } else if (i === anchorSlide) {
      pill.className = 'slide-pill anchor';
    } else if (i >= rangeStart && i <= rangeEnd) {
      pill.className = 'slide-pill in-range';
    }
    pill.addEventListener('click', () => selectSlide(i));
    grid.appendChild(pill);
  }
  const sri = document.getElementById('sri-value');
  if (sri) sri.textContent = `Slides ${rangeStart} – ${rangeEnd}`;
  const btn = document.getElementById('study-btn');
  if (btn) btn.textContent = `Study slides ${rangeStart}–${rangeEnd} →`;
}

function selectSlide(n) {
  if (doneSlideSets.has(n)) return;
  if (!selecting) {
    selecting = true;
    anchorSlide = n;
    rangeStart = n;
    rangeEnd = n;
  } else {
    selecting = false;
    rangeStart = Math.min(anchorSlide, n);
    rangeEnd = Math.max(anchorSlide, n);
    // Clamp: skip over fully-done slides at boundaries
    while (doneSlideSets.has(rangeStart) && rangeStart <= rangeEnd) rangeStart++;
    while (doneSlideSets.has(rangeEnd) && rangeEnd >= rangeStart) rangeEnd--;
    anchorSlide = null;
  }
  renderSlideGrid();
}

// ── Session list ──────────────────────────────────────────────────────────────
function renderSessionList() {
  const list = document.getElementById('session-list');
  if (!list || !activeDoc) return;
  const sessions = [...(activeDoc.sessions || [])].reverse();
  list.innerHTML = sessions.map(s => `
    <div class="session-row">
      <div class="sess-dot ${s.done ? '' : (activeSession?.session_id === s.session_id ? 'active' : 'pending')}"></div>
      <div class="sess-info">
        <div class="sess-label">${escapeHtml(s.label)}</div>
        <div class="sess-meta">Slides ${s.slide_start}–${s.slide_end} · ${s.done ? 'Completed' : 'In progress'}</div>
      </div>
      <div class="sess-score ${s.done ? '' : 'pending'}">${s.done ? (s.score != null ? s.score + '%' : '—') : 'In progress'}</div>
    </div>
  `).join('');
}

// ── Summary section ──────────────────────────────────────────────────────────
function renderSummarySection(resp) {
  const area = document.getElementById('quiz-area');
  if (!area) return;

  const summaries = resp.slide_summaries || [];
  const slideCount = summaries.length;

  const slidesHtml = summaries.map(s => `
    <div style="padding:16px 0;border-bottom:0.5px solid var(--border)">
      <div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:6px">Slide ${s.slide_number}</div>
      <div style="font-family:var(--serif);font-size:16px;margin-bottom:8px;color:var(--cream)">${escapeHtml(s.summary_title || '')}</div>
      <div style="font-size:13px;color:var(--cream-60);line-height:1.7;margin-bottom:10px">${escapeHtml(s.overview || '')}</div>
      ${s.takeaways && s.takeaways.length ? `
        <div style="display:flex;flex-direction:column;gap:5px">
          ${s.takeaways.map(t => `<div style="display:flex;gap:8px;font-size:12px;color:var(--cream-40);line-height:1.6"><span style="color:var(--gold);flex-shrink:0">→</span>${escapeHtml(t)}</div>`).join('')}
        </div>` : ''}
    </div>
  `).join('');

  area.innerHTML = `
    <div class="section-label" style="margin:24px 0 12px">Summary — ${escapeHtml(activeSession?.label || '')}</div>
    <div style="border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:24px">
      <div style="padding:18px 24px;border-bottom:0.5px solid var(--border);background:rgba(200,184,154,0.03);display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:13px;font-weight:500;color:var(--cream-60)">Slides ${activeSession?.slideStart}–${activeSession?.slideEnd} · ${slideCount} slide${slideCount!==1?'s':''}</div>
          <div style="font-size:11px;color:var(--cream-25);margin-top:2px">Read through each slide summary before taking the quiz</div>
        </div>
        <div id="quiz-ready-btn">
          <div style="font-size:12px;color:var(--cream-25);font-style:italic">Quiz generating…</div>
        </div>
      </div>
      <div style="padding:0 24px 8px">${slidesHtml}</div>
    </div>
  `;
}

function showQuizReadyButton() {
  const btn = document.getElementById('quiz-ready-btn');
  if (btn) {
    btn.innerHTML = `<button class="btn btn-primary" onclick="summaryVisible=false;renderQuizArea()">Take quiz →</button>`;
  }
}

// ── Quiz area ─────────────────────────────────────────────────────────────────
function renderQuizArea() {
  const area = document.getElementById('quiz-area');
  if (!area) return;

  if (!activeSession) { area.innerHTML = ''; return; }

  if (activeSession.quizStatus === 'pending') {
    area.innerHTML = `
      <div class="section-label" style="margin:24px 0 12px">Quiz</div>
      <div class="quiz-area">
        <div class="quiz-pending">
          <div class="quiz-spinner"></div>
          <div class="qp-text">Mac 2 is generating your quiz for slides ${activeSession.slideStart}–${activeSession.slideEnd}…</div>
        </div>
      </div>`;
    return;
  }

  if (activeSession.quizStatus === 'error') {
    area.innerHTML = `
      <div class="section-label" style="margin:24px 0 12px">Quiz</div>
      <div class="quiz-area">
        <div style="text-align:center;padding:24px">
          <div style="font-size:13px;color:rgba(200,120,80,0.8);margin-bottom:14px">Quiz generation failed on Mac 2.</div>
          <button class="btn" onclick="retryQuiz()">Retry quiz</button>
        </div>
      </div>`;
    return;
  }

  if (quizSubmitted) {
    const correct = quizQuestions.filter((q, i) => quizAnswers[i] === q.correct_index).length;
    const pct = Math.round((correct / quizQuestions.length) * 100);
    area.innerHTML = `
      <div class="section-label" style="margin:24px 0 12px">Quiz results</div>
      <div class="quiz-area">
        <div class="quiz-results">
          <div class="qr-score">${pct}%</div>
          <div class="qr-label">${correct} of ${quizQuestions.length} correct · ${escapeHtml(activeSession.label)}</div>
          <div class="qr-actions">
            <button class="btn btn-primary" onclick="saveSessionScore(${pct})">Save & continue →</button>
            <button class="btn" onclick="reviewQuiz()">Review answers</button>
          </div>
        </div>
      </div>`;
    return;
  }

  area.innerHTML = `
    <div class="section-label" style="margin:24px 0 12px">Quiz — ${escapeHtml(activeSession.label)}</div>
    <div class="quiz-area">
      <div class="qa-header">
        <div>
          <div class="qa-kicker">Slides ${activeSession.slideStart}–${activeSession.slideEnd} · ${quizQuestions.length} questions</div>
          <div class="qa-title">Answer all questions, then submit.</div>
        </div>
        <button class="btn btn-primary" id="submit-quiz-btn" onclick="submitQuiz()" disabled>Submit quiz</button>
      </div>
      <div class="quiz-questions" id="quiz-questions"></div>
    </div>`;

  renderQuizQuestions();
}

function renderQuizQuestions() {
  const container = document.getElementById('quiz-questions');
  if (!container) return;
  container.innerHTML = quizQuestions.map((q, qi) => `
    <div class="qq-item" id="qq-${qi}">
      <div class="qq-num">Question ${qi + 1} · ${escapeHtml(q.topic || '')}</div>
      <div class="qq-text">${escapeHtml(q.question)}</div>
      <div class="qq-opts">
        ${q.options.map((opt, oi) => `
          <button class="qq-opt" id="qq-${qi}-${oi}" onclick="selectAnswer(${qi},${oi})">
            <span class="qq-mark">${'ABCD'[oi]}</span>${escapeHtml(opt)}
          </button>
        `).join('')}
      </div>
      <div class="qq-feedback" id="qq-fb-${qi}"></div>
    </div>
  `).join('');
}

function selectAnswer(qi, oi) {
  if (quizSubmitted) return;
  quizAnswers[qi] = oi;
  // Update UI for this question
  quizQuestions[0].options.forEach((_, j) => {
    const btn = document.getElementById(`qq-${qi}-${j}`);
    if (btn) {
      btn.classList.remove('selected');
      btn.querySelector('.qq-mark').textContent = 'ABCD'[j];
    }
  });
  const sel = document.getElementById(`qq-${qi}-${oi}`);
  if (sel) { sel.classList.add('selected'); sel.querySelector('.qq-mark').textContent = '●'; }
  // Enable submit if all answered
  const allAnswered = quizQuestions.every((_, i) => quizAnswers[i] !== undefined);
  const btn = document.getElementById('submit-quiz-btn');
  if (btn) btn.disabled = !allAnswered;
}

function submitQuiz() {
  quizSubmitted = true;
  // Show correct/wrong for each question
  quizQuestions.forEach((q, qi) => {
    const chosen = quizAnswers[qi];
    q.options.forEach((_, oi) => {
      const btn = document.getElementById(`qq-${qi}-${oi}`);
      if (!btn) return;
      if (oi === q.correct_index) btn.classList.add('correct');
      else if (oi === chosen) btn.classList.add('wrong');
      btn.style.pointerEvents = 'none';
    });
    const fb = document.getElementById(`qq-fb-${qi}`);
    if (fb) {
      const ok = chosen === q.correct_index;
      fb.className = `qq-feedback show ${ok ? 'correct' : 'wrong'}`;
      fb.textContent = `${ok ? 'Correct.' : 'Incorrect.'} ${q.explanation}`;
    }
  });
  renderQuizArea();
}

function reviewQuiz() {
  quizSubmitted = false;
  renderQuizArea();
  setTimeout(submitQuiz, 100);
}

async function saveSessionScore(score) {
  if (!activeDoc || !activeSession) return;
  try {
    await apiPost(`/api/pptx/session/complete?doc_id=${activeDoc.id}&session_id=${activeSession.session_id}&score=${score}`, {});
    // Update local session state
    activeDoc.sessions = activeDoc.sessions.map(s =>
      s.session_id === activeSession.session_id ? { ...s, done: true, score } : s
    );
    // Re-check coverage
    const covered = countCoveredSlides(activeDoc.sessions);
    if (covered >= activeDoc.total_slides) {
      activeDoc.module_unlocked = true;
      showToast('All slides covered — learning module unlocked!');
    } else {
      showToast(`Session saved · ${score}% · ${activeDoc.total_slides - covered} slides remaining`);
    }
    activeSession = null;
    quizQuestions = [];
    quizAnswers = {};
    quizSubmitted = false;
    // Update doneSlideSets
    doneSlideSets = new Set();
    activeDoc.sessions.filter(s => s.done).forEach(s => {
      for (let i = s.slide_start; i <= s.slide_end; i++) doneSlideSets.add(i);
    });
    // Auto-advance range
    let next = rangeEnd + 1;
    while (doneSlideSets.has(next) && next <= activeDoc.total_slides) next++;
    rangeStart = next;
    rangeEnd = Math.min(next + 4, activeDoc.total_slides);
    renderActiveDoc();
  } catch (err) {
    showToast(err.message || 'Could not save session');
  }
}

// ── Start session ─────────────────────────────────────────────────────────────
async function startSession() {
  if (!activeDoc) return;
  if (cancelPoll) { cancelPoll(); cancelPoll = null; }
  quizQuestions = [];
  quizAnswers = {};
  quizSubmitted = false;
  summaryVisible = false;

  try {
    const sessionNum = (activeDoc.sessions?.length || 0) + 1;
    const resp = await apiPost('/api/pptx/session/start', {
      doc_id: activeDoc.id,
      slide_start: rangeStart,
      slide_end: rangeEnd,
      session_label: `Session ${sessionNum} — Slides ${rangeStart}–${rangeEnd}`,
    });

    activeSession = {
      session_id: resp.session_id,
      job_id: resp.job_id,
      quizStatus: 'pending',
      slideStart: rangeStart,
      slideEnd: rangeEnd,
      label: `Session ${sessionNum} — Slides ${rangeStart}–${rangeEnd}`,
      summaries: resp.slide_summaries,
    };

    // Add session to local doc
    activeDoc.sessions = activeDoc.sessions || [];
    activeDoc.sessions.push({
      session_id: resp.session_id,
      label: activeSession.label,
      slide_start: rangeStart,
      slide_end: rangeEnd,
      done: false,
      score: null,
    });

    // Mark slides as done for coverage
    doneSlideSets = new Set();
    activeDoc.sessions.forEach(s => {
      if (s.done || s.session_id === resp.session_id) {
        for (let i = s.slide_start; i <= s.slide_end; i++) doneSlideSets.add(i);
      }
    });

    if (resp.module_unlocked) activeDoc.module_unlocked = true;

    // Show summary first — quiz loads in background while user reads
    summaryVisible = true;
    renderActiveDoc();
    renderSummarySection(resp);

    // Poll for quiz in background
    cancelPoll = pollForQuizPptx(resp.job_id, {
      onDone: (quiz) => {
        quizQuestions = (quiz.questions || []).map(q => ({
          question: q.question,
          options: q.options,
          correct_index: q.correct_index,
          explanation: q.explanation,
          topic: q.topic,
        }));
        activeSession.quizStatus = 'done';
        if (summaryVisible) {
          // User is still reading summary — show a button to proceed to quiz
          showQuizReadyButton();
          showToast(`Quiz ready — click "Take quiz" when you're done reading`);
        } else {
          renderQuizArea();
          showToast(`Quiz ready — ${quizQuestions.length} questions for slides ${rangeStart}–${rangeEnd}`);
        }
      },
      onError: (msg) => {
        activeSession.quizStatus = 'error';
        renderQuizArea();
        showToast(msg || 'Quiz generation failed');
      },
    });

    showToast(`Session started · Slides ${rangeStart}–${rangeEnd} · Quiz generating on Mac 2…`);
  } catch (err) {
    showToast(err.message || 'Could not start session');
  }
}

function pollForQuizPptx(jobId, { onDone, onError }) {
  let attempts = 0;
  const iv = setInterval(async () => {
    attempts++;
    if (attempts > 60) {
      clearInterval(iv);
      onError('Quiz timed out — check Mac 2 is running.');
      return;
    }
    try {
      const data = await apiGet(`/api/pptx/quiz-status/${jobId}`);
      if (data.status === 'done') { clearInterval(iv); onDone(data.result); }
      else if (data.status === 'error') { clearInterval(iv); onError(data.error); }
    } catch (err) { clearInterval(iv); onError(err.message); }
  }, 3000);
  return () => clearInterval(iv);
}

async function retryQuiz() {
  if (!activeSession) return;
  activeSession.quizStatus = 'pending';
  renderQuizArea();
  // Restart session (creates a new quiz job)
  await startSession();
}

// ── Upload handling ───────────────────────────────────────────────────────────
async function handleFileSelect(event) {
  const file = event.target.files?.[0];
  if (!file) return;
  await uploadPptx(file);
}

function initDragDrop() {
  const zone = document.getElementById('upload-zone');
  if (!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', async e => {
    e.preventDefault(); zone.classList.remove('drag');
    const file = e.dataTransfer.files?.[0];
    if (file) await uploadPptx(file);
  });
}

async function uploadPptx(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['ppt', 'pptx'].includes(ext)) { showToast('Only .pptx and .ppt files are supported'); return; }
  if (file.size > 10 * 1024 * 1024) { showToast('File exceeds 10 MB limit'); return; }
  if (!isPro) {
    renderProLock();
    return;
  }

  const titleGuess = file.name.replace(/\.(pptx?|PPTx?)$/, '');
  renderProcessing(titleGuess, '?', 5);

  const form = new FormData();
  form.append('file', file);

  try {
    const resp = await apiPostForm('/api/pptx/upload', form);
    pollForProcessing(resp.doc_id, resp.title, resp.total_slides);
  } catch (err) {
    showToast(err.message || 'Upload failed');
    renderUploadZone();
  }
}

function pollForProcessing(docId, title, totalSlides) {
  let progress = 8;
  let attempts = 0;
  const iv = setInterval(async () => {
    attempts++;
    progress = Math.min(92, progress + (Math.random() * 6));
    const fill = document.getElementById('proc-prog-fill');
    const label = document.getElementById('proc-prog-label');
    if (fill) fill.style.width = progress + '%';
    if (label) label.textContent = `Summarising slide ${Math.round(progress / 100 * totalSlides)} of ${totalSlides}…`;

    if (attempts > 120) { clearInterval(iv); showToast('Processing is taking longer than expected. Please wait.'); return; }

    try {
      const doc = await apiGet(`/api/pptx/status/${docId}`);
      if (doc.status === 'ready') {
        clearInterval(iv);
        activeDoc = { ...doc, id: docId };
        rangeStart = 1;
        rangeEnd = Math.min(5, activeDoc.total_slides);
        renderActiveDoc();
        showToast('All slides summarised and ready');
      }
    } catch (_) {}
  }, 4000);
}

// ── Load existing doc ─────────────────────────────────────────────────────────
async function loadDoc(docId) {
  try {
    const doc = await apiGet(`/api/pptx/status/${docId}`);
    activeDoc = { ...doc, id: docId };
    if (doc.status !== 'ready') {
      renderProcessing(doc.title, doc.total_slides, 50);
      pollForProcessing(docId, doc.title, doc.total_slides);
      return;
    }
    // Restore doneSlideSets
    doneSlideSets = new Set();
    (doc.sessions || []).filter(s => s.done).forEach(s => {
      for (let i = s.slide_start; i <= s.slide_end; i++) doneSlideSets.add(i);
    });
    // Find next uncovered range
    let next = 1;
    while (doneSlideSets.has(next) && next <= doc.total_slides) next++;
    rangeStart = next;
    rangeEnd = Math.min(next + 4, doc.total_slides);
    renderActiveDoc();
  } catch (err) {
    showToast(err.message || 'Could not load document');
  }
}

function backToUpload() {
  activeDoc = null;
  activeSession = null;
  if (cancelPoll) { cancelPoll(); cancelPoll = null; }
  renderUploadZone();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function countCoveredSlides(sessions) {
  const covered = new Set();
  (sessions || []).filter(s => s.done).forEach(s => {
    for (let i = s.slide_start; i <= s.slide_end; i++) covered.add(i);
  });
  return covered.size;
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  // Pro check: non-pro users see upload zone (same as free upload page)
  // but session features (slide picker, quiz) are locked
  try {
    if (isPro) prevDocs = await apiGet('/api/pptx/my-documents');
  } catch (_) { prevDocs = []; }

  // Check if coming from a specific doc
  const params = new URLSearchParams(window.location.search);
  const docId = params.get('doc');
  if (docId) {
    if (!isPro) { renderProLock(); return; }
    await loadDoc(docId);
    return;
  }

  renderUploadZone();
}

init();
</script>
