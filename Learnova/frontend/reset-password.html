<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Learnova — Reset password</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body{margin:0;background:var(--bg);display:flex;align-items:center;justify-content:center;min-height:100vh}
    .rp-card{border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:40px 36px;width:100%;max-width:420px;margin:24px;
             background:radial-gradient(120% 120% at 0% 0%,rgba(200,184,154,0.08),transparent 50%),
                        linear-gradient(180deg,rgba(240,237,232,0.04),rgba(240,237,232,0.02))}
    .rp-logo{font-family:var(--serif);font-size:22px;margin-bottom:24px;text-align:center}
    .rp-logo em{color:var(--gold);font-style:italic}
    .rp-title{font-family:var(--serif);font-size:26px;text-align:center;margin-bottom:8px;letter-spacing:-0.5px}
    .rp-sub{font-size:13px;color:var(--cream-40);text-align:center;margin-bottom:28px;line-height:1.7}
    .rp-success{display:none;text-align:center;padding:20px 0}
    .rp-success.show{display:block}
    .rp-success-icon{width:48px;height:48px;border-radius:50%;background:rgba(107,158,107,0.12);
                     border:0.5px solid rgba(107,158,107,0.25);display:flex;align-items:center;
                     justify-content:center;margin:0 auto 16px}
    .rp-success-text{font-size:14px;color:var(--cream-60);line-height:1.7;margin-bottom:20px}
    .rp-error{display:none;text-align:center;padding:20px 0}
    .rp-error.show{display:block}
    .rp-error-icon{width:48px;height:48px;border-radius:50%;background:rgba(200,120,80,0.12);
                   border:0.5px solid rgba(200,120,80,0.25);display:flex;align-items:center;
                   justify-content:center;margin:0 auto 16px}
    .rp-error-text{font-size:14px;color:rgba(200,120,80,0.9);line-height:1.7;margin-bottom:20px}
  </style>
</head>
<body>

<div class="rp-card fade-up">
  <div class="rp-logo">Learnova <em>✦</em></div>
  <div id="rp-content">
      <div class="rp-title">Set a new password</div>
      <div class="rp-sub">Your reset link is valid for 1 hour.</div>

      <div id="rp-form">
        <div class="form-field">
          <label class="field-label">New password</label>
          <input class="input" type="password" placeholder="Min. 8 characters" id="rp-password"/>
          <div style="font-size:11px;color:var(--cream-40);margin-top:6px;line-height:1.6">Must have at least 8 characters, one uppercase letter, one number, and one symbol.</div>
        </div>
        <div class="form-field">
          <label class="field-label">Confirm new password</label>
          <input class="input" type="password" placeholder="Re-enter your new password" id="rp-confirm"/>
        </div>
      <button class="btn-primary btn" style="width:100%;justify-content:center;margin-top:8px" id="rp-btn" onclick="resetPassword()">Set new password</button>
    </div>

    <div class="rp-success" id="rp-success">
      <div class="rp-success-icon">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#6B9E6B" stroke-width="1.5"><path d="M3 12l5 5L19 6"/></svg>
      </div>
      <div class="rp-success-text">Your password has been reset successfully.</div>
      <a href="index.html" class="btn btn-primary" style="display:inline-flex">Sign in with new password</a>
    </div>

    <div class="rp-error" id="rp-error">
      <div class="rp-error-icon">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="rgba(200,120,80,0.9)" stroke-width="1.5"><circle cx="11" cy="11" r="9"/><path d="M11 7v4M11 14v1"/></svg>
      </div>
      <div class="rp-error-text" id="rp-error-text">This reset link is invalid or has expired.</div>
      <a href="forgot-password.html" class="btn" style="display:inline-flex">Request a new link</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
var resetToken = '';

(function() {
  var params = new URLSearchParams(window.location.search);
  resetToken = params.get('token') || '';
  if (!resetToken) {
    document.getElementById('rp-form').style.display = 'none';
    document.getElementById('rp-error').classList.add('show');
    document.getElementById('rp-error-text').textContent = 'No reset token found. Use the link from your email.';
  }
})();

function resetPassword() {
  var password = document.getElementById('rp-password').value;
  var confirm = document.getElementById('rp-confirm').value;
  if (!password || !confirm) { showToast('Please fill in all fields'); return; }
  if (password.length < 8) { showToast('Password must be at least 8 characters'); btn.disabled = false; btn.textContent = 'Set new password'; return; }
  if (!/[A-Z]/.test(password)) { showToast('Password must contain at least one uppercase letter'); btn.disabled = false; btn.textContent = 'Set new password'; return; }
  if (!/[0-9]/.test(password)) { showToast('Password must contain at least one number'); btn.disabled = false; btn.textContent = 'Set new password'; return; }
  if (!/[!@#$%^&*()_+\[\]{}|;':\",.\/<>?~`]/.test(password)) { showToast('Password must contain at least one symbol'); btn.disabled = false; btn.textContent = 'Set new password'; return; }
  if (password !== confirm) { showToast('Passwords do not match'); btn.disabled = false; btn.textContent = 'Set new password'; return; }
  var btn = document.getElementById('rp-btn');
  btn.disabled = true; btn.textContent = 'Resetting…';
  fetch('/api/auth/reset-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: resetToken, new_password: password, confirm_password: confirm }),
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if (data.detail) { showToast(data.detail); btn.disabled = false; btn.textContent = 'Set new password'; return; }
    document.getElementById('rp-form').style.display = 'none';
    document.getElementById('rp-success').classList.add('show');
  })
  .catch(function(){ showToast('Could not connect to server'); btn.disabled = false; btn.textContent = 'Set new password'; });
}
</script>
</body>
</html>
