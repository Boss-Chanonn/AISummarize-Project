<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Learnova — Quiz Results</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .results-header {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 30px;
      padding: 28px; border: 0.5px solid var(--border); border-radius: var(--radius-lg);
      background:
        radial-gradient(120% 120% at 0% 0%, rgba(200,184,154,0.09), transparent 44%),
        linear-gradient(180deg, rgba(240,237,232,0.045), rgba(240,237,232,0.02));
    }
    .rh-tag { font-size: 10px; letter-spacing: 1.3px; text-transform: uppercase; color: var(--cream-25); margin-bottom: 14px; }
    .rh-title { font-family: var(--serif); font-size: 32px; font-weight: 400; letter-spacing: -0.8px; line-height: 1.1; margin-bottom: 8px; }
    .rh-title em { font-style: italic; color: var(--gold); }
    .rh-doc { font-size: 12px; color: var(--cream-25); }

    /* Score ring */
    .score-wrap { text-align: center; flex-shrink: 0; }
    .ring-label { font-size: 11px; color: var(--cream-25); letter-spacing: 0.4px; margin-top: 8px; }

    /* Panels */
    .feedback-panels { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 32px; }
    .fb-panel { padding: 22px; background: linear-gradient(180deg, rgba(240,237,232,0.045), rgba(240,237,232,0.02)); border: 0.5px solid var(--border); border-radius: var(--radius-lg); }
    .fb-panel.strength { border-color: rgba(107,158,107,0.28); background: rgba(107,158,107,0.04); }
    .fb-panel.weakness { border-color: rgba(200,120,80,0.22); background: rgba(200,120,80,0.03); }
    .fb-head { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .fb-dot { width: 5px; height: 5px; border-radius: 50%; }
    .fb-dot-s { background: var(--green); }
    .fb-dot-w { background: var(--red-soft); }
    .fb-dot-r { background: var(--gold); }
    .fb-title { font-size: 10px; letter-spacing: 0.9px; text-transform: uppercase; color: var(--cream-25); }
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; }

    /* Question breakdown */
    .q-list { display: flex; flex-direction: column; gap: 8px; }
    .q-item {
      padding: 14px 16px;
      border: 0.5px solid var(--border); border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(240,237,232,0.045), rgba(240,237,232,0.02));
    }
    .q-item.correct { border-color: rgba(107,158,107,0.22); background: rgba(107,158,107,0.04); }
    .q-item.wrong   { border-color: rgba(200,120,80,0.18);  background: rgba(200,120,80,0.03); }
    .q-row { display: flex; align-items: flex-start; gap: 10px; }
    .q-mark { font-size: 12px; flex-shrink: 0; margin-top: 1px; font-weight: 500; }
    .q-mark.c { color: var(--green); }
    .q-mark.w { color: var(--red-soft); }
    .q-text { font-size: 13px; color: var(--cream-60); line-height: 1.55; flex: 1; }
    .q-ans  { font-size: 11px; color: var(--cream-25); margin-top: 5px; margin-left: 22px; line-height: 1.5; }
    .q-ans-wrong { color: rgba(200,120,80,0.75); }

    .bottom-actions { display: flex; gap: 10px; margin-top: 32px; padding-top: 24px; border-top: 0.5px solid var(--border); }

    @media (max-width: 860px) {
      .results-header { flex-direction: column; gap: 24px; }
      .feedback-panels { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount"></div>
  <main class="main-content">

    <div class="results-header fade-up">
      <div style="max-width:420px">
        <div class="rh-tag">Quiz complete</div>
        <div class="rh-title">Here's how you <em>performed.</em></div>
        <div class="rh-doc" id="result-doc-title">Loading…</div>
      </div>
      <div class="score-wrap">
        <svg width="110" height="110" viewBox="0 0 110 110">
          <circle cx="55" cy="55" r="40" fill="none" stroke="rgba(240,237,232,0.06)" stroke-width="7"/>
          <circle cx="55" cy="55" r="40" fill="none" stroke="#C8B89A" stroke-width="7"
            stroke-linecap="round"
            stroke-dasharray="251.2"
            stroke-dashoffset="251.2"
            transform="rotate(-90 55 55)"
            id="score-ring-circle" style="stroke-dashoffset:251.2"/>
          <text x="55" y="55" text-anchor="middle" dominant-baseline="central"
            font-family="DM Serif Display,serif" font-size="24" fill="#F0EDE8" id="score-ring-text">—</text>
        </svg>
        <div class="ring-label" id="score-ring-label">— of — correct</div>
      </div>
    </div>

    <div class="feedback-panels fade-up fade-up-1 reveal reveal-delay-1" id="feedback-panels"></div>

    <div class="fade-up fade-up-2 reveal reveal-delay-2">
      <div class="section-label">Question breakdown</div>
      <div class="q-list" id="q-list"></div>
    </div>

    <div class="bottom-actions fade-up fade-up-3">
      <a href="dashboard.html" class="btn">Back to dashboard</a>
      <button class="btn" id="btn-retake">Retake quiz</button>
      <a href="module.html" class="btn btn-gold" id="btn-module">View learning module →</a>
    </div>

  </main>
</div>

<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>
<script src="js/app.js"></script>
<script>
// Auth guard — redirect to login if no token
(function() {
  const token = localStorage.getItem('token');
  if (!token) { window.location.replace('index.html'); }
})();

document.getElementById('sidebar-mount').innerHTML = renderSidebar('history');

async function loadResults() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id') || '';
  try {
    const token = localStorage.getItem('token') || '';
    const res = await fetch('/api/results?id=' + encodeURIComponent(id),
      token ? { headers: { 'Authorization': 'Bearer ' + token } } : {}
    );
    const data = await res.json();
    if (!res.ok) { showResultsError(data.message); return; }

    const an = data.analysis || {};
    const quizFull = data.quizFull || [];
    const userAnswers = data.userAnswers || [];
    const correct = data.correct || 0;
    const total = data.total || quizFull.length;

    document.getElementById('result-doc-title').textContent = (data.title || '') + ' · ' + total + ' questions';
    document.getElementById('score-ring-text').textContent = (data.score || 0) + '%';
    document.getElementById('score-ring-label').textContent = correct + ' of ' + total + ' correct';

    document.getElementById('feedback-panels').innerHTML =
      '<div class="fb-panel strength">' +
        '<div class="fb-head"><span class="fb-dot fb-dot-s"></span><span class="fb-title">Strengths</span></div>' +
        '<div class="tag-cloud">' + (an.strengths || []).map(s => `<span class="badge badge-green">${escapeHtml(s)}</span>`).join('') + '</div>' +
      '</div>' +
      '<div class="fb-panel weakness">' +
        '<div class="fb-head"><span class="fb-dot fb-dot-w"></span><span class="fb-title">Needs work</span></div>' +
        '<div class="tag-cloud">' + (an.weaknesses || []).map(s => `<span class="badge badge-red">${escapeHtml(s)}</span>`).join('') + '</div>' +
      '</div>' +
      '<div class="fb-panel">' +
        '<div class="fb-head"><span class="fb-dot fb-dot-r"></span><span class="fb-title">Study next</span></div>' +
        '<div class="tag-cloud">' + (an.studyNext || []).map(s => `<span class="badge badge-gold">${escapeHtml(s)}</span>`).join('') + '</div>' +
      '</div>';

    document.getElementById('q-list').innerHTML = quizFull.map((q, i) => {
      const chosen = userAnswers[i];
      const isCorrect = chosen === q.correct;
      const yourAnswer = chosen !== undefined ? (q.opts[chosen] || 'No answer') : 'No answer';
      const correctAnswer = q.opts[q.correct] || '';
      return `<div class="q-item ${isCorrect ? 'correct' : 'wrong'}">` +
        `<div class="q-row"><span class="q-mark ${isCorrect ? 'c' : 'w'}">${isCorrect ? '✓' : '✗'}</span><span class="q-text">${escapeHtml(q.q)}</span></div>` +
        `<div class="q-ans">Your answer: ${escapeHtml(yourAnswer)}${!isCorrect && correctAnswer ? ` &nbsp;·&nbsp; <span class="q-ans-wrong">Correct: ${escapeHtml(correctAnswer)}</span>` : ''}</div>` +
      `</div>`;
    }).join('');

    const hid = data._id || id;
    document.getElementById('btn-module').href = 'module.html?historyId=' + hid;
    document.getElementById('btn-retake').onclick = function() {
      window.location.href = 'upload.html?resume=' + hid + '&mode=quiz';
    };

    setTimeout(function() {
      const ring = document.getElementById('score-ring-circle');
      if (ring && window.LN) window.LN.animateScoreRing(ring, data.score);
    }, 300);
  } catch (e) {
    showResultsError('Could not load results.');
  }
}

function showResultsError(msg) {
  document.querySelector('main.main-content').innerHTML =
    '<div style="padding:60px 40px;color:var(--cream-25);font-size:14px">' + (msg || 'Result not found') +
    ' — <a href="upload.html" style="color:var(--gold)">Take a new quiz →</a></div>';
}

loadResults();
</script>
<script src="js/animations.js"></script>
</body>
</html>
